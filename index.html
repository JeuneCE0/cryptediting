// ============ CRYPTSTORE (Supabase data layer) ============
// Service object: mappers camelCase ↔ snake_case + CRUD ciblé par mutation.
// L'UI fait des optimistic updates (useState immédiat) puis appelle le store en BG.
// Les ids sont des UUID générés côté JS (newId).

const dateOnly = (s) => s ? String(s).slice(0, 10) : null;
const num = (n) => (n == null || n === '') ? 0 : Number(n);
const groupBy = (arr, key) => (arr || []).reduce((acc, x) => {
  (acc[x[key]] ||= []).push(x); return acc;
}, {});

const cryptStore = {
  // ---- Mappers ----
  clientToDB: (c) => ({
    id: c.id, company: c.company, name: c.name,
    email: c.email || null, phone: c.phone || null
  }),
  clientFromDB: (r) => ({
    id: r.id, company: r.company, name: r.name,
    email: r.email || '', phone: r.phone || '',
    createdAt: dateOnly(r.created_at)
  }),

  projectToDB: (p, opts = {}) => {
    const o = {
      id: p.id, title: p.title, client_id: p.clientId, type: p.type,
      stage: p.stage, budget: num(p.budget),
      start_date: dateOnly(p.startDate), deadline: dateOnly(p.deadline),
      notes: p.notes || '',
      invoiced_amount: num(p.invoicedAmount),
      paid_amount: num(p.paidAmount),
      hours_logged: num(p.hoursLogged)
    };
    if (opts.excludeId) delete o.id;
    return o;
  },
  projectFromDB: (r, tasks, delivs, revs) => ({
    id: r.id, title: r.title, clientId: r.client_id,
    type: r.type, stage: r.stage,
    budget: num(r.budget),
    startDate: dateOnly(r.start_date), deadline: dateOnly(r.deadline),
    notes: r.notes || '',
    invoicedAmount: num(r.invoiced_amount),
    paidAmount: num(r.paid_amount),
    hoursLogged: num(r.hours_logged),
    createdAt: dateOnly(r.created_at),
    tasks: (tasks || []).slice().sort((a,b) => a.sort_order - b.sort_order)
      .map(t => ({ id: t.id, label: t.label, done: !!t.done, order: t.sort_order })),
    deliverables: (delivs || []).map(d => ({
      id: d.id, kind: d.kind, label: d.label, url: d.url, createdAt: dateOnly(d.created_at)
    })),
    revisionHistory: (revs || []).slice().sort((a,b) => a.round - b.round)
      .map(r => ({ id: r.id, round: r.round, date: dateOnly(r.date), feedback: r.feedback, status: r.status }))
  }),

  taskToDB: (t, projectId) => ({
    id: t.id, project_id: projectId, label: t.label,
    done: !!t.done, sort_order: t.order ?? 0
  }),
  deliverableToDB: (d, projectId) => ({
    id: d.id, project_id: projectId,
    kind: d.kind || 'other', label: d.label, url: d.url
  }),
  revisionToDB: (r, projectId) => ({
    id: r.id, project_id: projectId, round: r.round,
    date: dateOnly(r.date), feedback: r.feedback || '',
    status: r.status || 'pending'
  }),

  invoiceToDB: (i, opts = {}) => {
    const o = {
      id: i.id, number: i.number,
      project_id: i.projectId, client_id: i.clientId,
      amount: num(i.amount), status: i.status || 'pending',
      issue_date: dateOnly(i.issueDate), due_date: dateOnly(i.dueDate),
      paid_date: dateOnly(i.paidDate)
    };
    if (opts.excludeId) delete o.id;
    return o;
  },
  invoiceFromDB: (r) => ({
    id: r.id, number: r.number,
    projectId: r.project_id, clientId: r.client_id,
    amount: num(r.amount), status: r.status,
    issueDate: dateOnly(r.issue_date),
    dueDate: dateOnly(r.due_date),
    paidDate: dateOnly(r.paid_date)
  }),

  // ---- Hydrate (charge tout en parallèle) ----
  async hydrate() {
    const [c, p, t, d, r, i, tm] = await Promise.all([
      supabase.from('clients').select('*'),
      supabase.from('projects').select('*'),
      supabase.from('project_tasks').select('*'),
      supabase.from('project_deliverables').select('*'),
      supabase.from('project_revisions').select('*'),
      supabase.from('invoices').select('*'),
      supabase.from('timers').select('*').limit(1)
    ]);
    const errs = [c, p, t, d, r, i, tm].map(x => x.error).filter(Boolean);
    if (errs.length) throw new Error(errs.map(e => e.message).join(' / '));

    const tasksBy = groupBy(t.data, 'project_id');
    const delivsBy = groupBy(d.data, 'project_id');
    const revsBy = groupBy(r.data, 'project_id');

    return {
      clients: (c.data || []).map(this.clientFromDB),
      projects: (p.data || []).map(row => this.projectFromDB(
        row, tasksBy[row.id] || [], delivsBy[row.id] || [], revsBy[row.id] || []
      )),
      invoices: (i.data || []).map(this.invoiceFromDB),
      timer: tm.data?.[0] ? {
        projectId: tm.data[0].project_id,
        startedAt: new Date(tm.data[0].started_at).getTime()
      } : null
    };
  },

  // ---- CRUD ----
  async createClient(c) {
    const { error } = await supabase.from('clients').insert(this.clientToDB(c));
    if (error) throw error;
  },
  async updateClient(c) {
    const { error } = await supabase.from('clients').update(this.clientToDB(c)).eq('id', c.id);
    if (error) throw error;
  },
  async deleteClient(id) {
    const { error } = await supabase.from('clients').delete().eq('id', id);
    if (error) throw error;
  },

  async createProject(p) {
    const { error } = await supabase.from('projects').insert(this.projectToDB(p));
    if (error) throw error;
    if (p.tasks?.length) {
      const { error: e } = await supabase.from('project_tasks').insert(p.tasks.map(t => this.taskToDB(t, p.id)));
      if (e) throw e;
    }
    if (p.deliverables?.length) {
      const { error: e } = await supabase.from('project_deliverables').insert(p.deliverables.map(d => this.deliverableToDB(d, p.id)));
      if (e) throw e;
    }
    if (p.revisionHistory?.length) {
      const { error: e } = await supabase.from('project_revisions').insert(p.revisionHistory.map(r => this.revisionToDB(r, p.id)));
      if (e) throw e;
    }
  },
  // updateProject: replace les sub-collections (delete + insert).
  // Suffisant pour ce volume (< 50 sub-rows par projet) ; à optimiser si besoin.
  async updateProject(p) {
    const { error } = await supabase.from('projects')
      .update(this.projectToDB(p, { excludeId: true })).eq('id', p.id);
    if (error) throw error;

    await supabase.from('project_tasks').delete().eq('project_id', p.id);
    if (p.tasks?.length) {
      const { error: e } = await supabase.from('project_tasks').insert(p.tasks.map(t => this.taskToDB(t, p.id)));
      if (e) throw e;
    }
    await supabase.from('project_deliverables').delete().eq('project_id', p.id);
    if (p.deliverables?.length) {
      const { error: e } = await supabase.from('project_deliverables').insert(p.deliverables.map(d => this.deliverableToDB(d, p.id)));
      if (e) throw e;
    }
    await supabase.from('project_revisions').delete().eq('project_id', p.id);
    if (p.revisionHistory?.length) {
      const { error: e } = await supabase.from('project_revisions').insert(p.revisionHistory.map(r => this.revisionToDB(r, p.id)));
      if (e) throw e;
    }
  },
  async deleteProject(id) {
    const { error } = await supabase.from('projects').delete().eq('id', id);
    if (error) throw error;
  },
  // patchProjectAmounts: mise à jour ciblée des montants (utilisé par les sync invoices).
  async patchProjectAmounts(id, patch) {
    const allowed = {};
    if (patch.invoicedAmount != null) allowed.invoiced_amount = num(patch.invoicedAmount);
    if (patch.paidAmount != null) allowed.paid_amount = num(patch.paidAmount);
    if (patch.hoursLogged != null) allowed.hours_logged = num(patch.hoursLogged);
    if (patch.stage != null) allowed.stage = patch.stage;
    if (Object.keys(allowed).length === 0) return;
    const { error } = await supabase.from('projects').update(allowed).eq('id', id);
    if (error) throw error;
  },

  async createInvoice(i) {
    const { error } = await supabase.from('invoices').insert(this.invoiceToDB(i));
    if (error) throw error;
  },
  async updateInvoice(i) {
    const { error } = await supabase.from('invoices')
      .update(this.invoiceToDB(i, { excludeId: true })).eq('id', i.id);
    if (error) throw error;
  },
  async deleteInvoice(id) {
    const { error } = await supabase.from('invoices').delete().eq('id', id);
    if (error) throw error;
  },

  async setTimer(userId, timer) {
    if (!timer) {
      const { error } = await supabase.from('timers').delete().eq('user_id', userId);
      if (error) throw error;
      return;
    }
    const { error } = await supabase.from('timers').upsert({
      user_id: userId,
      project_id: timer.projectId,
      started_at: new Date(timer.startedAt).toISOString()
    });
    if (error) throw error;
  },

  // ---- Reset complet (utilisé par le bouton "effacer toutes les données") ----
  async resetAll(userId) {
    // Cascade fait le boulot : delete clients → tout suit
    await supabase.from('timers').delete().eq('user_id', userId);
    await supabase.from('invoices').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    await supabase.from('clients').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    // projects/tasks/deliverables/revisions cascade depuis clients → ok
  },

  // ---- Import depuis localStorage (au 1er login si DB vide) ----
  // Remap des ids legacy ('c123' etc.) vers UUIDs et préserve les FK.
  async importFromLocal(local) {
    const idMap = {};
    const remap = (id) => {
      if (!id) return id;
      if (!idMap[id]) idMap[id] = newId();
      return idMap[id];
    };

    const clients = (local.clients || []).map(c => ({ ...c, id: remap(c.id) }));
    const projects = (local.projects || []).map(p => ({
      ...p,
      id: remap(p.id),
      clientId: remap(p.clientId),
      tasks: (p.tasks || []).map(t => ({ ...t, id: remap(t.id) })),
      deliverables: (p.deliverables || []).map(d => ({ ...d, id: remap(d.id) })),
      revisionHistory: (p.revisionHistory || []).map(r => ({ ...r, id: remap(r.id) }))
    }));
    const invoices = (local.invoices || []).map(i => ({
      ...i, id: remap(i.id),
      projectId: remap(i.projectId),
      clientId: remap(i.clientId)
    }));

    if (clients.length) {
      const { error } = await supabase.from('clients').insert(clients.map(c => this.clientToDB(c)));
      if (error) throw error;
    }
    if (projects.length) {
      const { error } = await supabase.from('projects').insert(projects.map(p => this.projectToDB(p)));
      if (error) throw error;

      const allTasks = projects.flatMap(p => (p.tasks || []).map(t => this.taskToDB(t, p.id)));
      if (allTasks.length) {
        const { error: e } = await supabase.from('project_tasks').insert(allTasks);
        if (e) throw e;
      }
      const allDelivs = projects.flatMap(p => (p.deliverables || []).map(d => this.deliverableToDB(d, p.id)));
      if (allDelivs.length) {
        const { error: e } = await supabase.from('project_deliverables').insert(allDelivs);
        if (e) throw e;
      }
      const allRevs = projects.flatMap(p => (p.revisionHistory || []).map(r => this.revisionToDB(r, p.id)));
      if (allRevs.length) {
        const { error: e } = await supabase.from('project_revisions').insert(allRevs);
        if (e) throw e;
      }
    }
    if (invoices.length) {
      const { error } = await supabase.from('invoices').insert(invoices.map(i => this.invoiceToDB(i)));
      if (error) throw error;
    }
    return { clients, projects, invoices };
  }
};

// ============ MAIN APP ============
function JessyDashboard() {
  const [session, setSession] = useState(undefined); // undefined = checking, null = unauth, object = authed
  const [activeView, setActiveView] = useState('today');
  const [clients, setClients] = useState([]);
  const [projects, setProjects] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedProject, setSelectedProject] = useState(null);
  const [selectedClient, setSelectedClient] = useState(null);
  const [showNewProject, setShowNewProject] = useState(false);
  const [showNewClient, setShowNewClient] = useState(false);
  const [showNewInvoice, setShowNewInvoice] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmInvoiceDel, setConfirmInvoiceDel] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [timer, setTimer] = useState(null); // { projectId, startedAt: epoch ms } | null
  const [, setTick] = useState(0); // force re-render chaque seconde quand un timer tourne
  const toast = useToast();

  // Rôle courant — valeur par défaut sûre tant que session n'est pas chargée.
  // L'UI principale n'est rendue qu'après auth donc le calcul est cohérent au render.
  const currentRole = (session?.user?.user_metadata?.role) || 'member';
  const isAdmin = currentRole === 'admin';
  const isViewer = currentRole === 'viewer';
  const blockIfViewer = (label) => {
    if (!isViewer) return false;
    toast?.(`${label} indisponible en lecture seule`, 'error');
    return true;
  };

  // Auth: récupère la session courante puis écoute les changements (login/logout/refresh)
  useEffect(() => {
    let mounted = true;
    const hideLoader = () => {
      const el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    };
    supabase.auth.getSession().then(({ data }) => {
      if (!mounted) return;
      setSession(data.session || null);
      hideLoader();
    });
    const { data: sub } = supabase.auth.onAuthStateChange((_event, sess) => {
      if (!mounted) return;
      setSession(sess || null);
      hideLoader();
      // À la déconnexion, on remet l'état UI à zéro pour ne pas garder en mémoire
      // les vues/sélections du précédent utilisateur si quelqu'un d'autre se loggue.
      if (!sess) {
        setSelectedProject(null);
        setSelectedClient(null);
        setActiveView('today');
        setLoading(true);
      }
    });
    return () => { mounted = false; sub.subscription.unsubscribe(); };
  }, []);

  // Hydrate depuis Supabase. Au 1er login, si la DB est vide ET le localStorage
  // contient des données legacy, on les importe automatiquement.
  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    (async () => {
      try {
        let { clients: c, projects: p, invoices: i, timer: tm } = await cryptStore.hydrate();
        if (cancelled) return;

        const stored = loadStore();
        const dbEmpty = c.length === 0 && p.length === 0 && i.length === 0;
        const hasLegacy = stored && (
          (stored.clients?.length || 0) +
          (stored.projects?.length || 0) +
          (stored.invoices?.length || 0)
        ) > 0;

        if (dbEmpty && hasLegacy && !isViewer) {
          toast?.('Import des données locales vers Supabase…', 'info');
          try {
            await cryptStore.importFromLocal({
              clients: stored.clients || [],
              projects: (stored.projects || []).map(migrateProject),
              invoices: stored.invoices || []
            });
            const fresh = await cryptStore.hydrate();
            if (cancelled) return;
            c = fresh.clients; p = fresh.projects; i = fresh.invoices; tm = fresh.timer;
            // Backup : on renomme l'ancienne clé pour pouvoir restaurer manuellement si besoin
            try { localStorage.setItem(STORAGE_KEY + '-imported-' + Date.now(), localStorage.getItem(STORAGE_KEY) || ''); } catch {}
            try { localStorage.removeItem(STORAGE_KEY); } catch {}
            toast?.(`Importé : ${c.length} clients, ${p.length} projets, ${i.length} factures`, 'success');
          } catch (e) {
            console.error('Import localStorage échoué', e);
            toast?.(`Import échoué : ${e.message}`, 'error');
          }
        }

        setClients(c);
        setProjects(p.map(migrateProject));
        setInvoices(reconcileInvoiceStatus(i));
        setTimer(tm);
        setLoading(false);
      } catch (e) {
        if (cancelled) return;
        console.error('Hydrate Supabase échoué', e);
        toast?.(`Chargement Supabase échoué : ${e.message}`, 'error');
        // Fallback : on charge depuis localStorage pour ne pas bloquer l'app.
        const stored = loadStore();
        setClients(stored?.clients || []);
        setProjects((stored?.projects || []).map(migrateProject));
        setInvoices(reconcileInvoiceStatus(stored?.invoices || []));
        if (stored?.timer && typeof stored.timer.startedAt === 'number' && stored.timer.projectId) {
          setTimer(stored.timer);
        }
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [session]);

  // Cache localStorage en backup (pas la source de vérité). Permet une lecture instantanée
  // au reload si Supabase est lent ou indisponible.
  useEffect(() => {
    if (!loading && session) saveStore({ clients, projects, invoices, timer });
  }, [clients, projects, invoices, timer, loading, session]);

  // Helper : enveloppe un appel cryptStore. Si erreur réseau/RLS, on toast ;
  // l'état local n'est pas rollback (l'utilisateur peut reload pour resync).
  const persist = useCallback((label, promise) => {
    Promise.resolve(promise).catch(e => {
      console.error(`Sync ${label} échouée`, e);
      toast?.(`Sync ${label} échouée : ${e.message}`, 'error');
    });
  }, [toast]);

  // Tick chaque seconde uniquement si timer actif (sinon laisse le CPU tranquille)
  useEffect(() => {
    if (!timer) return;
    const id = setInterval(() => setTick(t => (t + 1) % 1e9), 1000);
    return () => clearInterval(id);
  }, [timer]);

  const updateProject = (data, opts = {}) => {
    if (blockIfViewer('Modification')) return;
    setProjects(prev => prev.map(p => p.id === data.id ? data : p));
    if (selectedProject?.id === data.id) setSelectedProject(data);
    if (opts.toast) toast?.(opts.toast);
    persist('projet', cryptStore.updateProject(data));
  };
  const deleteProject = (id) => {
    if (blockIfViewer('Suppression')) return;
    const p = projects.find(x => x.id === id);
    setProjects(prev => prev.filter(x => x.id !== id));
    setInvoices(prev => prev.filter(i => i.projectId !== id));
    toast?.(`« ${p?.title || 'Projet'} » supprimé`);
    persist('suppression projet', cryptStore.deleteProject(id));
  };
  const createProject = (p) => {
    if (blockIfViewer('Création')) return;
    setProjects(prev => [...prev, p]);
    toast?.('Projet créé');
    persist('création projet', cryptStore.createProject(p));
  };
  const duplicateProject = (project) => {
    if (blockIfViewer('Duplication')) return;
    const dup = duplicateProjectData(project);
    setProjects(prev => [...prev, dup]);
    setSelectedProject(dup);
    toast?.(`Projet dupliqué : ${dup.title}`, 'info');
    persist('duplication projet', cryptStore.createProject(dup));
  };
  const createClient = (c) => {
    if (blockIfViewer('Création')) return;
    setClients(prev => [...prev, c]);
    toast?.('Client ajouté');
    persist('création client', cryptStore.createClient(c));
  };
  const updateClient = (data) => {
    if (blockIfViewer('Modification')) return;
    setClients(prev => prev.map(c => c.id === data.id ? data : c));
    if (selectedClient?.id === data.id) setSelectedClient(data);
    toast?.('Client mis à jour');
    persist('client', cryptStore.updateClient(data));
  };
  const deleteClient = (id) => {
    if (blockIfViewer('Suppression')) return;
    const c = clients.find(x => x.id === id);
    const projIds = projects.filter(p => p.clientId === id).map(p => p.id);
    setClients(prev => prev.filter(x => x.id !== id));
    setProjects(prev => prev.filter(p => p.clientId !== id));
    setInvoices(prev => prev.filter(i => i.clientId !== id && !projIds.includes(i.projectId)));
    toast?.(`${c?.company || 'Client'} supprimé`);
    // Cascade DB s'occupera des projects/invoices/tasks/etc.
    persist('suppression client', cryptStore.deleteClient(id));
  };
  const updateInvoice = (id, patch) => {
    if (blockIfViewer('Modification')) return;
    const previous = invoices.find(x => x.id === id);
    setInvoices(prev => prev.map(i => {
      if (i.id !== id) return i;
      const updated = { ...i, ...patch };
      // Sync paidAmount sur le projet quand on passe à payé
      if (patch.status === 'paid' && i.status !== 'paid') {
        setProjects(curr => curr.map(p => p.id === i.projectId ? { ...p, paidAmount: Math.min(p.budget, (p.paidAmount || 0) + i.amount) } : p));
      } else if (patch.status && patch.status !== 'paid' && i.status === 'paid') {
        setProjects(curr => curr.map(p => p.id === i.projectId ? { ...p, paidAmount: Math.max(0, (p.paidAmount || 0) - i.amount) } : p));
      }
      return updated;
    }));
    if (patch.status === 'paid') toast?.('Facture marquée payée');
    if (previous) {
      const updated = { ...previous, ...patch };
      persist('facture', cryptStore.updateInvoice(updated));
      // Sync paidAmount projet si changement de statut
      if (patch.status === 'paid' && previous.status !== 'paid') {
        const proj = projects.find(p => p.id === previous.projectId);
        if (proj) persist('projet (montants)', cryptStore.patchProjectAmounts(proj.id, {
          paidAmount: Math.min(proj.budget, (proj.paidAmount || 0) + previous.amount)
        }));
      } else if (patch.status && patch.status !== 'paid' && previous.status === 'paid') {
        const proj = projects.find(p => p.id === previous.projectId);
        if (proj) persist('projet (montants)', cryptStore.patchProjectAmounts(proj.id, {
          paidAmount: Math.max(0, (proj.paidAmount || 0) - previous.amount)
        }));
      }
    }
  };
  const deleteInvoice = (inv) => {
    if (blockIfViewer('Suppression')) return;
    setInvoices(prev => prev.filter(i => i.id !== inv.id));
    const proj = projects.find(p => p.id === inv.projectId);
    setProjects(prev => prev.map(p => {
      if (p.id !== inv.projectId) return p;
      return {
        ...p,
        invoicedAmount: Math.max(0, (p.invoicedAmount || 0) - inv.amount),
        paidAmount: inv.status === 'paid' ? Math.max(0, (p.paidAmount || 0) - inv.amount) : p.paidAmount
      };
    }));
    toast?.('Facture supprimée');
    persist('suppression facture', cryptStore.deleteInvoice(inv.id));
    if (proj) {
      persist('projet (montants)', cryptStore.patchProjectAmounts(proj.id, {
        invoicedAmount: Math.max(0, (proj.invoicedAmount || 0) - inv.amount),
        paidAmount: inv.status === 'paid' ? Math.max(0, (proj.paidAmount || 0) - inv.amount) : proj.paidAmount
      }));
    }
  };
  const createInvoice = (inv) => {
    if (blockIfViewer('Création')) return;
    setInvoices(prev => [...prev, inv]);
    const proj = projects.find(p => p.id === inv.projectId);
    setProjects(prev => prev.map(p => p.id === inv.projectId ? { ...p, invoicedAmount: (p.invoicedAmount || 0) + inv.amount } : p));
    toast?.(`Facture ${inv.number} émise`);
    persist('création facture', cryptStore.createInvoice(inv));
    if (proj) {
      persist('projet (montants)', cryptStore.patchProjectAmounts(proj.id, {
        invoicedAmount: (proj.invoicedAmount || 0) + inv.amount
      }));
    }
  };
  // Changement de stage centralisé (kanban + détail projet).
  // « Encaissé » solde le projet ET marque ses factures payées (sinon les KPI et
  // les relances restent désynchronisés) ; en ressortir annule l'encaissement.
  const moveStage = (projectId, newStage) => {
    if (blockIfViewer('Déplacement')) return;
    const p = projects.find(x => x.id === projectId);
    if (!p || p.stage === newStage) return;

    const projInvoices = invoices.filter(i => i.projectId === projectId);
    const goingPaid = newStage === 'paid';
    const leavingPaid = p.stage === 'paid';
    const todayStr = today.toISOString().slice(0, 10);

    // Resync des factures selon l'entrée / la sortie d'« Encaissé »
    let invoiceUpdates = [];
    if (goingPaid) {
      invoiceUpdates = projInvoices.filter(i => i.status !== 'paid')
        .map(i => ({ ...i, status: 'paid', paidDate: todayStr }));
    } else if (leavingPaid) {
      invoiceUpdates = projInvoices.filter(i => i.status === 'paid')
        .map(i => ({ ...i, status: 'pending', paidDate: null }));
    }

    // Montants du projet
    const patch = { stage: newStage };
    if (goingPaid) {
      // Soldé : facturé au moins égal au budget, intégralement encaissé.
      patch.invoicedAmount = Math.max(p.invoicedAmount || 0, p.budget);
      patch.paidAmount = p.budget;
    } else if (leavingPaid) {
      // Recalcul depuis les factures réelles (désormais remises en attente).
      patch.invoicedAmount = projInvoices.reduce((s, i) => s + i.amount, 0);
      patch.paidAmount = 0;
    }

    // Mise à jour du state
    if (invoiceUpdates.length) {
      const byId = Object.fromEntries(invoiceUpdates.map(i => [i.id, i]));
      setInvoices(prev => prev.map(i => byId[i.id] || i));
    }
    setProjects(prev => prev.map(x => x.id === projectId ? { ...x, ...patch } : x));
    if (selectedProject?.id === projectId) setSelectedProject(prev => ({ ...prev, ...patch }));

    // Toast + persistance
    const meta = STAGES.find(s => s.id === newStage);
    toast?.(`${p.title} → ${meta?.label}`, 'info');
    persist('stage projet', cryptStore.patchProjectAmounts(projectId, patch));
    invoiceUpdates.forEach(inv => persist('facture (sync Encaissé)', cryptStore.updateInvoice(inv)));
  };
  const resetData = () => {
    if (blockIfViewer('Reset')) return;
    setClients([]);
    setProjects([]);
    setInvoices([]);
    setTimer(null);
    setConfirmReset(false);
    toast?.('Toutes les données ont été effacées', 'info');
    persist('reset DB', cryptStore.resetAll(session?.user?.id));
  };

  // Timer: enregistre les heures sur le projet courant et stoppe.
  // opts.silent évite le toast (utile lors d'un switch automatique).
  const stopTimer = (opts = {}) => {
    if (!timer) return;
    if (blockIfViewer('Timer')) return;
    const hours = elapsedToHours(Date.now() - timer.startedAt);
    const projectId = timer.projectId;
    const round025 = (v) => Math.round(v * 4) / 4;
    const proj = projects.find(p => p.id === projectId);
    const newHours = proj ? round025((proj.hoursLogged || 0) + hours) : null;
    setProjects(prev => prev.map(p => p.id === projectId
      ? { ...p, hoursLogged: round025((p.hoursLogged || 0) + hours) }
      : p));
    setSelectedProject(curr => (curr && curr.id === projectId)
      ? { ...curr, hoursLogged: round025((curr.hoursLogged || 0) + hours) }
      : curr);
    setTimer(null);
    if (!opts.silent) {
      toast?.(`+${hours}h enregistrée${hours > 1 ? 's' : ''}${proj ? ' · ' + proj.title : ''}`);
    }
    persist('timer', cryptStore.setTimer(session?.user?.id, null));
    if (newHours != null) persist('heures projet', cryptStore.patchProjectAmounts(projectId, { hoursLogged: newHours }));
  };

  const startTimer = (projectId) => {
    const project = projects.find(p => p.id === projectId);
    if (!project) return;
    if (timer && timer.projectId === projectId) return;
    if (timer) stopTimer({ silent: true });
    const next = { projectId, startedAt: Date.now() };
    setTimer(next);
    toast?.(`Timer démarré · ${project.title}`, 'info');
    persist('timer', cryptStore.setTimer(session?.user?.id, next));
  };

  // Raccourci clavier global pour la recherche
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('global-search')?.focus();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const navItems = [
    { id: 'today', label: "Aujourd'hui", icon: Sun },
    { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
    { id: 'projects', label: 'Projets', icon: FolderKanban },
    { id: 'calendar', label: 'Calendrier', icon: CalendarDays },
    { id: 'invoices', label: 'Facturation', icon: Receipt },
    { id: 'clients', label: 'Clients', icon: Users },
    ...(isAdmin ? [{ id: 'team', label: 'Équipe', icon: Shield }] : [])
  ];

  const totalNotifs =
    invoices.filter(i => i.status === 'overdue').length +
    projects.filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) < 0).length +
    projects.filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) >= 0 && daysUntil(p.deadline) <= 5).length +
    projects.reduce((s, p) => s + (p.revisionHistory || []).filter(r => r.status === 'pending').length, 0);

  // Si la vue active n'est plus accessible (ex: admin → viewer en cours de session),
  // on rebascule sur Today via effet pour éviter setState pendant le render.
  // ⚠️ Doit rester AVANT tout return conditionnel (règles des hooks) : sinon le
  // nombre de hooks varie entre les renders (session/loading) → React error #310.
  useEffect(() => {
    if (activeView === 'team' && !isAdmin) setActiveView('today');
  }, [activeView, isAdmin]);

  if (session === undefined) return null; // toujours en train de vérifier la session
  if (!session) return <LoginScreen />;
  if (loading) return null;

  const handleLogout = async () => {
    await supabase.auth.signOut();
  };

  const userInitials = (session?.user?.user_metadata?.name || session?.user?.email || 'JE')
    .split(/[\s@.]+/)
    .filter(Boolean)
    .slice(0, 2)
    .map(s => s[0]?.toUpperCase())
    .join('') || 'JE';

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200 grain font-body">
      <div className="flex min-h-screen">
        <aside className="w-60 border-r border-zinc-800/80 bg-zinc-950/95 flex flex-col">
          <div className="p-5 border-b border-zinc-800/80">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center">
                <Film className="w-5 h-5 text-zinc-950" />
              </div>
              <div>
                <div className="font-display text-xl text-zinc-100 leading-none">Jessy</div>
                <div className="text-[10px] text-zinc-500 font-mono uppercase tracking-widest">Studio OS</div>
              </div>
            </div>
          </div>

          <nav className="flex-1 p-3">
            {navItems.map(n => {
              const Icon = n.icon;
              const active = activeView === n.id;
              return (
                <button key={n.id} onClick={() => setActiveView(n.id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-body mb-1 transition-colors ${active ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900'}`}>
                  <Icon className="w-4 h-4" />
                  {n.label}
                </button>
              );
            })}
          </nav>

          <div className="p-3 border-t border-zinc-800/80 space-y-2">
            <div className="px-2 py-1.5 space-y-1.5">
              <div className="flex items-center gap-2 text-[11px] text-zinc-500 font-mono truncate">
                <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 flex-shrink-0"></div>
                <span className="truncate">{session?.user?.email}</span>
              </div>
              <RoleBadge role={currentRole} />
            </div>
            <button onClick={() => setConfirmReset(true)} disabled={isViewer}
              className="w-full flex items-center gap-2 text-[11px] text-zinc-600 hover:text-zinc-300 disabled:hover:text-zinc-700 disabled:cursor-not-allowed px-2 py-1.5 transition-colors font-mono">
              <RotateCcw className="w-3 h-3" /> Effacer toutes les données
            </button>
            <button onClick={handleLogout} className="w-full flex items-center gap-2 text-[11px] text-zinc-600 hover:text-rose-300 px-2 py-1.5 transition-colors font-mono">
              <LogOut className="w-3 h-3" /> Se déconnecter
            </button>
          </div>
        </aside>

        <main className="flex-1 flex flex-col min-w-0">
          <header className="border-b border-zinc-800/80 bg-zinc-950/80 backdrop-blur-sm sticky top-0 z-20">
            <div className="flex items-center gap-4 px-6 py-3">
              <div className="flex-1 max-w-md relative">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                <input id="global-search" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Rechercher  ⌘K" className="w-full bg-zinc-900/60 border border-zinc-800 rounded-lg pl-10 pr-3 py-2 text-sm text-zinc-200 font-body focus:border-zinc-600 focus:outline-none" />
                {searchQuery && (
                  <button onClick={() => setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
                    <X className="w-3.5 h-3.5" />
                  </button>
                )}
              </div>
              <div className="text-xs text-zinc-500 font-mono">{today.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}</div>
              {timer && (() => {
                const tProject = projects.find(p => p.id === timer.projectId);
                if (!tProject) return null;
                return (
                  <div className="flex items-center rounded-lg border border-amber-500/30 bg-amber-500/10 overflow-hidden">
                    <button
                      onClick={() => setSelectedProject(tProject)}
                      title="Ouvrir le projet en cours de timing"
                      className="flex items-center gap-2 pl-2 pr-2 py-1 hover:bg-amber-500/15 transition-colors"
                    >
                      <span className="w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse-slow" />
                      <span className="font-mono text-xs text-amber-200 tabular-nums">{formatElapsed(Date.now() - timer.startedAt)}</span>
                      <span className="text-[11px] text-amber-300/80 max-w-[160px] truncate">{tProject.title}</span>
                    </button>
                    <button
                      onClick={() => stopTimer()}
                      title="Arrêter le timer"
                      className="w-7 h-7 border-l border-amber-500/30 bg-amber-500/15 hover:bg-amber-500/30 text-amber-100 flex items-center justify-center transition-colors"
                    >
                      <Square className="w-3 h-3" />
                    </button>
                  </div>
                );
              })()}
              <div className="relative">
                <button onClick={() => setShowNotifs(v => !v)} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center relative transition-colors">
                  <Bell className="w-4 h-4" />
                  {totalNotifs > 0 && <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-amber-400 text-zinc-950 text-[10px] font-bold flex items-center justify-center">{totalNotifs}</span>}
                </button>
                {showNotifs && (
                  <NotificationsPanel
                    projects={projects}
                    invoices={invoices}
                    clients={clients}
                    onSelectProject={setSelectedProject}
                    onNavigate={setActiveView}
                    onClose={() => setShowNotifs(false)}
                  />
                )}
              </div>
              <div title={session?.user?.email} className="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-xs font-bold text-zinc-950">{userInitials}</div>
            </div>
            {isViewer && (
              <div className="px-6 py-2 border-t border-zinc-800/80 bg-zinc-900/40 flex items-center gap-2 text-xs text-zinc-400">
                <Eye className="w-3.5 h-3.5 text-zinc-500" />
                <span>Mode lecture seule — tu peux consulter mais pas modifier les données.</span>
              </div>
            )}
          </header>

          <div className="flex-1 p-6 overflow-y-auto scrollbar-thin">
            {activeView === 'today' && (
              <TodayView projects={projects} invoices={invoices} clients={clients} onSelectProject={setSelectedProject} onUpdateProject={updateProject} onUpdateInvoice={updateInvoice} onNavigate={setActiveView} />
            )}
            {activeView === 'dashboard' && (
              <DashboardView projects={projects} invoices={invoices} clients={clients} onSelectProject={setSelectedProject} onNewProject={() => setShowNewProject(true)} />
            )}
            {activeView === 'projects' && (
              <ProjectsView projects={projects} clients={clients} onSelectProject={setSelectedProject} onNewProject={() => setShowNewProject(true)} searchQuery={searchQuery} onMoveStage={moveStage} />
            )}
            {activeView === 'calendar' && (
              <CalendarView projects={projects} clients={clients} invoices={invoices} onSelectProject={setSelectedProject} />
            )}
            {activeView === 'invoices' && (
              <InvoicesView invoices={invoices} clients={clients} projects={projects} onUpdateInvoice={updateInvoice} onNewInvoice={() => setShowNewInvoice(true)} onDeleteInvoice={(inv) => setConfirmInvoiceDel(inv)} searchQuery={searchQuery} disableNew={projects.length === 0} />
            )}
            {activeView === 'clients' && (
              <ClientsView clients={clients} projects={projects} invoices={invoices} onNewClient={() => setShowNewClient(true)} onSelectClient={setSelectedClient} searchQuery={searchQuery} />
            )}
            {activeView === 'team' && isAdmin && (
              <TeamView currentUserId={session?.user?.id} />
            )}
          </div>
        </main>
      </div>

      {selectedProject && <ProjectDetail project={selectedProject} clients={clients} invoices={invoices} onClose={() => setSelectedProject(null)} onUpdate={updateProject} onMoveStage={moveStage} onDelete={deleteProject} onUpdateInvoice={updateInvoice} onDuplicate={duplicateProject} timer={timer} onStartTimer={startTimer} onStopTimer={stopTimer} />}
      {selectedClient && <ClientDetail client={selectedClient} projects={projects} invoices={invoices} onClose={() => setSelectedClient(null)} onUpdate={updateClient} onDelete={deleteClient} onSelectProject={setSelectedProject} />}
      {showNewProject && <NewProjectModal clients={clients} onClose={() => setShowNewProject(false)} onCreate={createProject} onCreateClient={() => setShowNewClient(true)} />}
      {showNewClient && <NewClientModal onClose={() => setShowNewClient(false)} onCreate={createClient} />}
      {showNewInvoice && <NewInvoiceModal projects={projects} clients={clients} invoices={invoices} onClose={() => setShowNewInvoice(false)} onCreate={createInvoice} />}

      <ConfirmModal
        open={confirmReset}
        title="Effacer toutes les données ?"
        message="Tous vos clients, projets et factures seront supprimés. Cette action est irréversible."
        confirmLabel="Tout effacer"
        danger
        onCancel={() => setConfirmReset(false)}
        onConfirm={resetData}
      />
      <ConfirmModal
        open={!!confirmInvoiceDel}
        title={`Supprimer la facture ${confirmInvoiceDel?.number} ?`}
        message="Cette action est irréversible. Le montant sera retiré du facturé du projet."
        confirmLabel="Supprimer"
        danger
        onCancel={() => setConfirmInvoiceDel(null)}
        onConfirm={() => { deleteInvoice(confirmInvoiceDel); setConfirmInvoiceDel(null); }}
      />
    </div>
  );
}

createRoot(document.getElementById('root')).render(
  <ToastProvider>
    <JessyDashboard />
  </ToastProvider>
);
</script>
</body>
</html>
