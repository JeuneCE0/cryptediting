  if (u.includes('wetransfer') || u.includes('we.tl')) return 'wetransfer';

const copyText = async (text) => {
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch { return false; }
};

const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((message, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div className="fixed bottom-6 right-6 z-[100] space-y-2 pointer-events-none">
        {toasts.map(t => {
          const map = {
            success: { bg: 'bg-emerald-500/15', border: 'border-emerald-500/40', text: 'text-emerald-200', icon: CheckCircle2 },
            error: { bg: 'bg-rose-500/15', border: 'border-rose-500/40', text: 'text-rose-200', icon: AlertCircle },
            info: { bg: 'bg-sky-500/15', border: 'border-sky-500/40', text: 'text-sky-200', icon: Sparkles }
          };
          const c = map[t.type] || map.success;
          const Icon = c.icon;
          return (
            <div key={t.id} className={`${c.bg} ${c.border} ${c.text} backdrop-blur-md border rounded-lg px-4 py-3 shadow-lg flex items-center gap-2.5 animate-in pointer-events-auto min-w-[220px]`}>
              <Icon className="w-4 h-4 flex-shrink-0" />
              <span className="text-sm font-body">{t.message}</span>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
};

        <div className="p-5 pt-0 flex justify-end gap-2">
          <button onClick={onCancel} className="text-sm px-4 py-2 text-zinc-400 hover:text-zinc-100 font-body">Annuler</button>
          <button onClick={onConfirm} className={`text-sm px-4 py-2 font-medium rounded-lg ${danger ? 'bg-rose-500 hover:bg-rose-400 text-zinc-50' : 'bg-amber-500 hover:bg-amber-400 text-zinc-950'}`}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
};

// ============ MODAL SHELL (gère ESC) ============
const useEscape = (active, handler) => {
  useEffect(() => {
    if (!active) return;
    const onKey = (e) => { if (e.key === 'Escape') handler(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [active, handler]);
};

// ============ COMPONENTS ============
const StagePill = ({ stage, size = 'sm' }) => {
  const meta = stageMeta(stage);
  const c = STAGE_COLORS[meta.color];
  const sizing = size === 'sm' ? 'text-xs px-2 py-0.5' : 'text-sm px-3 py-1';
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full font-medium font-body ${c.bg} ${c.text} ${c.border} border ${sizing}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
      {meta.label}
    </span>
  );
};

const StatusPill = ({ status }) => {
  const map = {
    paid: { bg: 'bg-emerald-500/10', text: 'text-emerald-300', label: 'Payée', dot: 'bg-emerald-400' },
    pending: { bg: 'bg-amber-500/10', text: 'text-amber-300', label: 'En attente', dot: 'bg-amber-400' },
    overdue: { bg: 'bg-rose-500/10', text: 'text-rose-300', label: 'En retard', dot: 'bg-rose-400 animate-pulse-slow' }
  };
  const c = map[status] || map.pending;
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full text-xs font-medium px-2 py-0.5 ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>{c.label}
    </span>
  );
};

const KPICard = ({ label, value, sub, accent = 'amber', icon: Icon }) => (
  <div className="bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-5 hover:border-zinc-700 transition-colors">
    <div className="flex items-start justify-between mb-3">
      <span className="text-xs uppercase tracking-widest text-zinc-500 font-mono">{label}</span>
      {Icon && <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${accent === 'amber' ? 'bg-amber-500/10 text-amber-400' : accent === 'emerald' ? 'bg-emerald-500/10 text-emerald-400' : accent === 'rose' ? 'bg-rose-500/10 text-rose-400' : 'bg-sky-500/10 text-sky-400'}`}><Icon className="w-4 h-4" /></div>}
    </div>
    <div className="font-display text-3xl text-zinc-100 mb-1 tracking-tight">{value}</div>
    {sub && <div className="text-xs text-zinc-500 font-body">{sub}</div>}
  </div>
);

// ============ SEARCH HELPER ============
const matchesQuery = (q, ...fields) => {
  if (!q) return true;
  const needle = q.toLowerCase().trim();
  return fields.some(f => (f || '').toString().toLowerCase().includes(needle));
};

const TodayView = ({ projects, invoices, clients, onSelectProject, onUpdateProject, onUpdateInvoice, onNavigate }) => {

  const hour = today.getHours();
  const greet = hour < 5 ? 'Bonne nuit' : hour < 12 ? 'Bonjour' : hour < 18 ? 'Bon après-midi' : 'Bonsoir';

  const overdueInvoices = invoices.filter(i => i.status === 'overdue');
  const pendingRevisions = projects
    .flatMap(p => (p.revisionHistory || []).filter(r => r.status === 'pending').map(r => ({ project: p, revision: r })))
    .sort((a, b) => new Date(a.revision.date) - new Date(b.revision.date));
  const urgentDeadlines = projects
    .filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) <= 3)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  const total = overdueInvoices.length + pendingRevisions.length + urgentDeadlines.length;

  const tickNextTask = (project) => {
    const next = nextPendingTask(project);

    const tasks = (project.tasks || []).map(t => t.id === next.id ? { ...t, done: true } : t);
    onUpdateProject({ ...project, tasks });
    toast?.(`✓ ${next.label}`);
  };

  const sendInvoiceReminder = (inv) => {
    const client = clients.find(c => c.id === inv.clientId);

  const totalOverdue = invoices.filter(i => i.status === 'overdue').reduce((s, i) => s + i.amount, 0);

  const pipeline = STAGES.map(s => ({
    ...s,
    count: projects.filter(p => p.stage === s.id).length,
    value: projects.filter(p => p.stage === s.id).reduce((sum, p) => sum + p.budget, 0)
  }));

  const upcomingDeadlines = [...projects]
    .filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) >= -3 && daysUntil(p.deadline) <= 21)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
    .slice(0, 6);

  const chartData = useMemo(() => {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(today); d.setMonth(d.getMonth() - i); d.setDate(1);
      months.push({
        label: d.toLocaleDateString('fr-FR', { month: 'short' }),
        month: d.getMonth(), year: d.getFullYear(),
        paid: 0
      });

      if (inv.paidDate) {
        const d = new Date(inv.paidDate);
        const m = months.find(x => x.month === d.getMonth() && x.year === d.getFullYear());

          return (

              key={stage.id}
              className="flex flex-col"
              onDragOver={e => { e.preventDefault(); setDragOver(stage.id); }}
              onDragLeave={() => setDragOver(prev => prev === stage.id ? null : prev)}
              onDrop={e => {
                e.preventDefault();
                if (dragId) onMoveStage(dragId, stage.id);
                setDragId(null);
                setDragOver(null);
              }}
            >
              <div className={`${c.bg} ${c.border} border rounded-lg px-3 py-2.5 mb-3 ${isOver ? 'ring-2 ring-amber-400/60' : ''}`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${c.dot}`}></span>
                    <span className={`text-xs font-medium ${c.text}`}>{stage.label}</span>
                  </div>
                  <span className="font-mono text-xs text-zinc-500">{stageProjects.length}</span>
                </div>
              </div>
              <div className={`flex-1 space-y-2 rounded-lg p-1 transition-colors ${isOver ? 'bg-zinc-800/40' : ''}`}>
                {stageProjects.map(p => {
                  const client = clients.find(cl => cl.id === p.clientId);
                  const days = daysUntil(p.deadline);
                  const urgent = days <= 3 && days >= 0 && p.stage !== 'invoicing';
                  const overdue = days < 0 && p.stage !== 'invoicing';
                  return (
                    <div
                      key={p.id}
                      draggable
                      onDragStart={() => setDragId(p.id)}
                      onDragEnd={() => { setDragId(null); setDragOver(null); }}
                      className={`bg-zinc-900/80 border border-zinc-800 rounded-lg p-3 hover:border-zinc-600 transition-all group cursor-grab active:cursor-grabbing ${dragId === p.id ? 'opacity-40' : ''}`}
                    >
                      <button onClick={() => onSelectProject(p)} className="w-full text-left">
                        <div className="text-xs text-zinc-500 font-body mb-1 truncate">{client?.company}</div>
                        <div className="text-sm text-zinc-100 font-medium mb-2 leading-snug">{p.title}</div>
                        {(() => {
                          const tasks = p.tasks || [];
                          const done = tasks.filter(t => t.done).length;
                          const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
                          if (tasks.length === 0) return null;
                          return (
                            <div className="mb-2">
                              <div className="flex items-center justify-between text-[10px] font-mono text-zinc-500 mb-1">
                                <span>{done}/{tasks.length} tâches</span>
                                <span>{pct}%</span>
                              </div>
                              <div className="h-1 bg-zinc-800 rounded-full overflow-hidden">
                                <div className={`h-full ${pct === 100 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}></div>
                              </div>
                            </div>
                          );
                        })()}
                        <div className="flex items-center justify-between text-xs">
                          <div className={`flex items-center gap-1 font-mono ${overdue ? 'text-rose-400' : urgent ? 'text-amber-400' : 'text-zinc-500'}`}>
                            <Clock className="w-3 h-3" />
                            {fmtDate(p.deadline)}
                          </div>
                          <div className="font-mono text-zinc-400">{eur(p.budget)}</div>
                        </div>
                        {(p.revisionHistory?.length || 0) > 0 && (
                          <div className="mt-2 text-xs text-violet-400 font-mono">⟲ {p.revisionHistory.length} révision{p.revisionHistory.length > 1 ? 's' : ''}</div>
                        )}
                      </button>
                    </div>
                  );
                })}
                {stageProjects.length === 0 && (
                  <div className="text-xs text-zinc-600 text-center py-6 font-body italic">{searchQuery ? 'Aucun résultat' : 'Vide'}</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div className="text-xs text-zinc-600 font-body italic">💡 Glisser-déposer pour changer l'étape.</div>
    </div>
  );
};

// ============ CALENDAR VIEW ============
const CalendarView = ({ projects, clients, invoices, onSelectProject }) => {
  const [cursor, setCursor] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const days = useMemo(() => {
    const year = cursor.getFullYear();
    const month = cursor.getMonth();
    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);
    const startDay = (first.getDay() + 6) % 7;
    const grid = [];
    for (let i = 0; i < startDay; i++) {
      const d = new Date(year, month, -startDay + i + 1);
      grid.push({ date: d, outside: true });
    }
    for (let i = 1; i <= last.getDate(); i++) grid.push({ date: new Date(year, month, i), outside: false });
    while (grid.length % 7 !== 0) {
      const lastD = grid[grid.length - 1].date;
      const d = new Date(lastD); d.setDate(d.getDate() + 1);
      grid.push({ date: d, outside: true });
    }
    while (grid.length < 42) {
      const lastD = grid[grid.length - 1].date;
      const d = new Date(lastD); d.setDate(d.getDate() + 1);
      grid.push({ date: d, outside: true });
    }
    return grid;
  }, [cursor]);

  const eventsForDay = (date) => {
    const ds = date.toISOString().slice(0, 10);
    const events = [];
    projects.forEach(p => {
      if (p.deadline === ds) events.push({ type: 'deadline', project: p });
    });
    invoices.forEach(i => {
      if (i.dueDate === ds && i.status !== 'paid') events.push({ type: 'invoice-due', invoice: i });
    });
    return events;
  };

  return (
    <div className="space-y-6 animate-in">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-2">Calendrier</div>
          <h1 className="font-display text-4xl text-zinc-100 tracking-tight capitalize">
            {cursor.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}
          </h1>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1))} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 hover:border-zinc-600 flex items-center justify-center transition-colors">
            <ChevronLeft className="w-4 h-4" />
          </button>
          <button onClick={() => setCursor(new Date(today.getFullYear(), today.getMonth(), 1))} className="text-sm px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-300 hover:border-zinc-600 font-body transition-colors">Aujourd'hui</button>
          <button onClick={() => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1))} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 hover:border-zinc-600 flex items-center justify-center transition-colors">
            <ChevronRight className="w-4 h-4" />
          </button>
        </div>
      </div>

      <div className="bg-zinc-900/40 border border-zinc-800/80 rounded-xl overflow-hidden">
        <div className="grid grid-cols-7 border-b border-zinc-800">
          {['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map(d => (
            <div key={d} className="px-3 py-2 text-xs uppercase tracking-widest text-zinc-500 font-mono text-center">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7">
          {days.map((d, i) => {
            const events = eventsForDay(d.date);
            const isToday = d.date.toDateString() === today.toDateString();
            return (
              <div key={i} className={`min-h-[110px] border-r border-b border-zinc-800/60 p-2 ${d.outside ? 'opacity-30' : ''} ${isToday ? 'bg-amber-500/5' : ''}`}>
                <div className={`text-xs font-mono mb-1.5 ${isToday ? 'text-amber-400 font-bold' : d.outside ? 'text-zinc-600' : 'text-zinc-400'}`}>
                  {d.date.getDate()}
                </div>
                <div className="space-y-1">
                  {events.slice(0, 3).map((ev, idx) => {
                    if (ev.type === 'deadline') {
                      const c = STAGE_COLORS[stageMeta(ev.project.stage).color];
                      const client = clients.find(cl => cl.id === ev.project.clientId);
                      return (
                        <button key={idx} onClick={() => onSelectProject(ev.project)} className={`w-full text-left ${c.bg} ${c.border} border rounded px-1.5 py-1 group hover:opacity-80 transition`}>
                          <div className="flex items-center gap-1">
                            <span className={`w-1 h-1 rounded-full ${c.dot} flex-shrink-0`}></span>
                            <span className={`text-[10px] font-mono ${c.text} truncate`}>⏱ {client?.company.split(' ')[0]}</span>
                          </div>
                          <div className="text-[10px] text-zinc-300 truncate font-body">{ev.project.title}</div>
                        </button>
                      );
                    }
                    if (ev.type === 'invoice-due') {
                      const overdue = ev.invoice.status === 'overdue';
                      return (
                        <div key={idx} className={`${overdue ? 'bg-rose-500/10 border-rose-500/30' : 'bg-amber-500/10 border-amber-500/30'} border rounded px-1.5 py-1`}>
                          <div className={`text-[10px] font-mono ${overdue ? 'text-rose-300' : 'text-amber-300'} truncate`}>€ {ev.invoice.number.slice(-4)}</div>
                          <div className="text-[10px] text-zinc-300 truncate font-body">{eur(ev.invoice.amount)}</div>
                        </div>
                      );
                    }
                    return null;
                  })}
                  {events.length > 3 && <div className="text-[10px] text-zinc-500 font-mono px-1">+{events.length - 3}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="flex items-center gap-4 text-xs text-zinc-500 font-body flex-wrap">
        <span>Légende :</span>
        {STAGES.map(s => {
          const c = STAGE_COLORS[s.color];
          return <span key={s.id} className="flex items-center gap-1.5"><span className={`w-2 h-2 rounded-full ${c.dot}`}></span>{s.label}</span>;
        })}
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-rose-400"></span>Facture en retard</span>
      </div>
    </div>
  );
};

// ============ PROJECT TASKS ============
const ProjectTasks = ({ project, onUpdate }) => {
  const [newLabel, setNewLabel] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const tasks = project.tasks || [];
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;

  const toggle = (id) => {
    onUpdate({ ...project, tasks: tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) });
  };
  const addTask = () => {
    if (!newLabel.trim()) return;
    const newTask = { id: 't' + Date.now(), label: newLabel.trim(), done: false, order: tasks.length };
    onUpdate({ ...project, tasks: [...tasks, newTask] });
    setNewLabel('');
  };
  const removeTask = (id) => {
    onUpdate({ ...project, tasks: tasks.filter(t => t.id !== id) });
  };
  const saveEdit = (id) => {
    if (!editLabel.trim()) { setEditingId(null); return; }
    onUpdate({ ...project, tasks: tasks.map(t => t.id === id ? { ...t, label: editLabel.trim() } : t) });
    setEditingId(null);
  };
  const resetTemplate = () => {
    onUpdate({ ...project, tasks: buildDefaultTasks(project.type) });
  };

  return (
    <div className="p-5 border-t border-zinc-800">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <ListTodo className="w-3.5 h-3.5 text-zinc-500" />
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Tâches</div>
        </div>
        <div className="flex items-center gap-3">
          <span className="text-xs font-mono text-zinc-500">{done}/{tasks.length}</span>
          {tasks.length === 0 && (
            <button onClick={resetTemplate} className="text-xs text-amber-400 hover:text-amber-300 font-body">Charger le modèle {project.type}</button>
          )}
        </div>
      </div>
      {tasks.length > 0 && (
        <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-3">
          <div className={`h-full transition-all ${pct === 100 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}></div>
        </div>
      )}
      <div className="space-y-1">
        {tasks.map(task => (
          <div key={task.id} className="flex items-center gap-2 group py-1">
            <button onClick={() => toggle(task.id)} className={`flex-shrink-0 ${task.done ? 'text-emerald-400' : 'text-zinc-600 hover:text-zinc-400'}`}>
              {task.done ? <CheckSquare className="w-4 h-4" /> : <Square className="w-4 h-4" />}
            </button>
            {editingId === task.id ? (
              <input
                autoFocus
                value={editLabel}
                onChange={e => setEditLabel(e.target.value)}
                onBlur={() => saveEdit(task.id)}
                onKeyDown={e => { if (e.key === 'Enter') saveEdit(task.id); if (e.key === 'Escape') setEditingId(null); }}
                className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-0.5 text-sm text-zinc-200 font-body"
              />
            ) : (
              <button
                onClick={() => { setEditingId(task.id); setEditLabel(task.label); }}
                className={`flex-1 text-left text-sm font-body ${task.done ? 'text-zinc-500 line-through' : 'text-zinc-200'}`}
              >
                {task.label}
              </button>
            )}
            <button onClick={() => removeTask(task.id)} className="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-rose-400 transition-opacity">
              <X className="w-3.5 h-3.5" />
            </button>
          </div>
        ))}
      </div>
      <div className="flex items-center gap-2 mt-3">
        <input
          value={newLabel}
          onChange={e => setNewLabel(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') addTask(); }}
          placeholder="Ajouter une tâche…"
          className="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-1.5 text-sm text-zinc-200 font-body focus:border-zinc-600 focus:outline-none"
        />
        <button onClick={addTask} disabled={!newLabel.trim()} className="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-200 rounded-lg font-body">+ Ajouter</button>
      </div>
    </div>
  );
};

// ============ PROJECT DELIVERABLES ============
const ProjectDeliverables = ({ project, client, onUpdate }) => {
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ url: '', label: '', kind: 'frameio' });
  const deliverables = project.deliverables || [];
  const toast = useToast();

  const submit = () => {
    if (!draft.url.trim()) return;
    const kind = draft.kind === 'auto' ? guessKind(draft.url) : draft.kind;
    const item = { id: 'd' + Date.now(), kind, label: draft.label.trim() || DELIVERABLE_KINDS[kind].label, url: draft.url.trim(), createdAt: today.toISOString().slice(0, 10) };
    onUpdate({ ...project, deliverables: [...deliverables, item] });
    setDraft({ url: '', label: '', kind: 'frameio' });
    setShowAdd(false);
  };
  const remove = (id) => {
    onUpdate({ ...project, deliverables: deliverables.filter(d => d.id !== id) });
  };
  const copyUrl = async (url) => {
    const ok = await copyText(url);
    toast?.(ok ? 'Lien copié' : 'Copie impossible', ok ? 'success' : 'error');
  };
  const sendMail = (template, deliverable) => {
    const tpl = EMAIL_TEMPLATES[template](project, client, deliverable);
    if (!client?.email) {
      // Fallback : copier le contenu si pas d'email client
      copyText(`${tpl.subject}\n\n${tpl.body}`).then(ok => toast?.(ok ? 'Email copié (pas d\'adresse client)' : 'Erreur copie', ok ? 'info' : 'error'));
      return;
    }
    window.location.href = buildMailto(client.email, tpl);
  };

  return (
    <div className="p-5 border-t border-zinc-800">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <Link2 className="w-3.5 h-3.5 text-zinc-500" />
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Livrables</div>
        </div>
        <button onClick={() => setShowAdd(v => !v)} className="text-xs text-amber-400 hover:text-amber-300 font-body inline-flex items-center gap-1">
          {showAdd ? <X className="w-3 h-3" /> : <Plus className="w-3 h-3" />}{showAdd ? 'Annuler' : 'Ajouter un lien'}
        </button>
      </div>

      {showAdd && (
        <div className="mb-3 p-3 bg-zinc-900/60 border border-zinc-800 rounded-lg space-y-2">
          <input
            autoFocus
            value={draft.url}
            onChange={e => setDraft({ ...draft, url: e.target.value, kind: guessKind(e.target.value) })}
            placeholder="https://app.frame.io/…"
            className="w-full bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm text-zinc-200 font-mono"
          />
          <div className="flex items-center gap-2">
            <input
              value={draft.label}
              onChange={e => setDraft({ ...draft, label: e.target.value })}
              placeholder="Label (Cut V1, Master, Sources…)"
              className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm text-zinc-200 font-body"
            />
            <select value={draft.kind} onChange={e => setDraft({ ...draft, kind: e.target.value })} className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm text-zinc-200 font-body">
              {Object.entries(DELIVERABLE_KINDS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
            <button onClick={submit} disabled={!draft.url.trim()} className="text-xs px-3 py-1.5 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-950 rounded-lg font-medium">Ajouter</button>
          </div>
        </div>
      )}

      {deliverables.length === 0 && !showAdd && (
        <div className="text-sm text-zinc-600 italic font-body">Aucun livrable. Ajoute un lien Frame.io, Drive, WeTransfer…</div>
      )}

      <div className="space-y-2">
        {deliverables.map(d => {
          const meta = DELIVERABLE_KINDS[d.kind] || DELIVERABLE_KINDS.other;
          const Icon = meta.icon;
          return (
            <div key={d.id} className={`group p-3 ${meta.bg} ${meta.border} border rounded-lg`}>
              <div className="flex items-center gap-3">
                <div className={`w-9 h-9 rounded-lg flex items-center justify-center ${meta.bg} border ${meta.border} flex-shrink-0`}>
                  <Icon className={`w-4 h-4 ${meta.color}`} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-sm text-zinc-200 font-medium truncate">{d.label}</span>
                    <span className={`text-[10px] font-mono uppercase tracking-wider ${meta.color}`}>{meta.label}</span>
                  </div>
                  <a href={d.url} target="_blank" rel="noreferrer" className="text-xs text-zinc-500 hover:text-amber-400 font-mono truncate inline-flex items-center gap-1">
                    {d.url} <ExternalLink className="w-3 h-3" />
                  </a>
                </div>
                <span className="text-[10px] text-zinc-600 font-mono whitespace-nowrap hidden sm:block">{fmtDate(d.createdAt)}</span>
                <button onClick={() => remove(d.id)} className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-rose-400 transition-opacity">
                  <Trash2 className="w-3.5 h-3.5" />
                </button>
              </div>
              <div className="flex items-center gap-1.5 mt-2 pl-12 flex-wrap">
                <button onClick={() => copyUrl(d.url)} className="text-[11px] text-zinc-400 hover:text-zinc-100 bg-zinc-900/60 hover:bg-zinc-900 border border-zinc-800 px-2 py-1 rounded inline-flex items-center gap-1 font-body transition-colors">
                  <Copy className="w-3 h-3" /> Copier le lien
                </button>
                <button onClick={() => sendMail('review', d)} title={client?.email || 'Pas d\'email client'} className="text-[11px] text-amber-300 hover:text-amber-200 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 px-2 py-1 rounded inline-flex items-center gap-1 font-body transition-colors">
                  <Send className="w-3 h-3" /> Envoyer pour review
                </button>
                <button onClick={() => sendMail('delivered', d)} title={client?.email || 'Pas d\'email client'} className="text-[11px] text-emerald-300 hover:text-emerald-200 bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/30 px-2 py-1 rounded inline-flex items-center gap-1 font-body transition-colors">
                  <CheckCircle2 className="w-3 h-3" /> Livraison finale
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ============ PROJECT REVISIONS ============
const ProjectRevisions = ({ project, client, onUpdate }) => {
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ feedback: '' });
  const history = project.revisionHistory || [];
  const nextRound = (history.reduce((m, r) => Math.max(m, r.round || 0), 0) || 0) + 1;
  const toast = useToast();
  const sendReminder = () => {
    const tpl = EMAIL_TEMPLATES.reminder(project, client);
    if (!client?.email) {
      copyText(`${tpl.subject}\n\n${tpl.body}`).then(ok => toast?.(ok ? 'Email copié (pas d\'adresse client)' : 'Erreur', ok ? 'info' : 'error'));
      return;
    }
    window.location.href = buildMailto(client.email, tpl);
  };

  const submit = () => {
    if (!draft.feedback.trim()) return;
    const item = { id: 'r' + Date.now(), round: nextRound, date: today.toISOString().slice(0, 10), feedback: draft.feedback.trim(), status: 'pending' };
    onUpdate({ ...project, revisionHistory: [...history, item] });
    setDraft({ feedback: '' });
    setShowAdd(false);
  };
  const setStatus = (id, status) => {
    onUpdate({ ...project, revisionHistory: history.map(r => r.id === id ? { ...r, status } : r) });
  };
  const remove = (id) => {
    onUpdate({ ...project, revisionHistory: history.filter(r => r.id !== id) });
  };

  return (
    <div className="p-5 border-t border-zinc-800">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <MessageSquare className="w-3.5 h-3.5 text-zinc-500" />
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Historique des révisions</div>
        </div>
        <button onClick={() => setShowAdd(v => !v)} className="text-xs text-amber-400 hover:text-amber-300 font-body inline-flex items-center gap-1">
          {showAdd ? <X className="w-3 h-3" /> : <Plus className="w-3 h-3" />}{showAdd ? 'Annuler' : `Round ${nextRound}`}
        </button>
      </div>

      {showAdd && (
        <div className="mb-3 p-3 bg-zinc-900/60 border border-zinc-800 rounded-lg space-y-2">
          <textarea
            autoFocus
            value={draft.feedback}
            onChange={e => setDraft({ feedback: e.target.value })}
            placeholder={`Retours du client (round ${nextRound})…`}
            rows="3"
            className="w-full bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm text-zinc-200 font-body"
          />
          <div className="flex justify-end">
            <button onClick={submit} disabled={!draft.feedback.trim()} className="text-xs px-3 py-1.5 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-950 rounded-lg font-medium">Enregistrer</button>
          </div>
        </div>
      )}

      {history.length === 0 && !showAdd && (
        <div className="text-sm text-zinc-600 italic font-body">Aucune révision enregistrée.</div>
      )}

      <div className="space-y-2">
        {history.slice().sort((a, b) => b.round - a.round).map(r => {
          const isPending = r.status === 'pending';
          return (
            <div key={r.id} className={`group p-3 rounded-lg border ${isPending ? 'bg-amber-500/5 border-amber-500/30' : 'bg-zinc-900/60 border-zinc-800'}`}>
              <div className="flex items-start justify-between gap-3 mb-1.5">
                <div className="flex items-center gap-2">
                  <span className={`text-xs font-mono px-2 py-0.5 rounded-full ${isPending ? 'bg-amber-500/15 text-amber-300' : 'bg-emerald-500/15 text-emerald-300'}`}>
                    Round {r.round}
                  </span>
                  <span className="text-xs text-zinc-500 font-mono">{fmtDate(r.date)}</span>
                  <span className={`text-[10px] uppercase tracking-wider font-mono ${isPending ? 'text-amber-400' : 'text-emerald-400'}`}>{isPending ? 'À traiter' : 'Traité'}</span>
                </div>
                <div className="flex items-center gap-2">
                  {isPending && (
                    <>
                      <button onClick={sendReminder} title={client?.email || 'Pas d\'email client'} className="text-xs text-amber-400 hover:text-amber-300 font-body inline-flex items-center gap-1">
                        <Send className="w-3 h-3" /> Relancer
                      </button>
                      <button onClick={() => setStatus(r.id, 'addressed')} className="text-xs text-emerald-400 hover:text-emerald-300 font-body inline-flex items-center gap-1">
                        <Check className="w-3 h-3" /> Traité
                      </button>
                    </>
                  )}
                  {!isPending && (
                    <button onClick={() => setStatus(r.id, 'pending')} className="text-xs text-zinc-500 hover:text-amber-400 font-body">Rouvrir</button>
                  )}
                  <button onClick={() => remove(r.id)} className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-rose-400 transition-opacity ml-1">
                    <Trash2 className="w-3 h-3" />
                  </button>
                </div>
              </div>
              <div className="text-sm text-zinc-300 font-body whitespace-pre-wrap">{r.feedback}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ============ PROJECT DETAIL MODAL ============
const ProjectDetail = ({ project, clients, invoices, onClose, onUpdate, onDelete, onUpdateInvoice, onDuplicate }) => {
  const [editing, setEditing] = useState(false);
  const [data, setData] = useState(project);
  const [confirmDel, setConfirmDel] = useState(false);
  useEscape(true, onClose);
  useEffect(() => { setData(project); setEditing(false); }, [project?.id]);
  if (!project) return null;
  const client = clients.find(c => c.id === project.clientId);
  const projectInvoices = invoices.filter(i => i.projectId === project.id);
  const stageIdx = STAGES.findIndex(s => s.id === project.stage);

  const handleSave = () => {
    if (!data.title.trim()) return;
    onUpdate(data, { toast: 'Projet mis à jour' });
    setEditing(false);
  };
  const advanceStage = () => {
    if (stageIdx < STAGES.length - 1) {
      const next = STAGES[stageIdx + 1];
      onUpdate({ ...project, stage: next.id }, { toast: `→ ${next.label}` });
    }
  };
  const previousStage = () => {
    if (stageIdx > 0) {
      const prev = STAGES[stageIdx - 1];
      onUpdate({ ...project, stage: prev.id }, { toast: `→ ${prev.label}` });
    }
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-in" onClick={onClose}>
      <div className="bg-zinc-950 border border-zinc-800 rounded-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto scrollbar-thin" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-zinc-950 border-b border-zinc-800 p-5 flex items-start justify-between z-10">
          <div className="flex-1">
            <div className="flex items-center gap-3 mb-2">
              <StagePill stage={project.stage} size="md" />
              <span className="text-xs font-mono text-zinc-500">{client?.company}</span>
            </div>
            {editing ? (
              <input value={data.title} onChange={e => setData({ ...data, title: e.target.value })} className="font-display text-2xl text-zinc-100 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 w-full" />
            ) : (
              <h2 className="font-display text-2xl text-zinc-100">{project.title}</h2>
            )}
            <div className="text-xs text-zinc-500 font-body mt-1">{project.type}</div>
          </div>
          <div className="flex items-center gap-2">
            {!editing && <button onClick={() => setEditing(true)} className="w-9 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center"><Edit3 className="w-4 h-4" /></button>}
            {editing && <button onClick={handleSave} className="px-3 h-9 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-zinc-950 text-sm font-medium">Sauvegarder</button>}
            <button onClick={onClose} className="w-9 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center"><X className="w-4 h-4" /></button>
          </div>
        </div>

        <div className="p-5 border-b border-zinc-800">
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-3">Étape</div>
          <div className="flex items-center gap-1">
            {STAGES.map((s, i) => {
              const c = STAGE_COLORS[s.color];
              const done = i < stageIdx;
              const current = i === stageIdx;
              return (
                <React.Fragment key={s.id}>
                  <div className={`flex-1 px-2 py-2 rounded-lg border text-center ${current ? `${c.bg} ${c.border} ${c.text}` : done ? 'bg-zinc-800 border-zinc-700 text-zinc-400' : 'bg-zinc-900 border-zinc-800 text-zinc-600'}`}>
                    <div className="text-[10px] font-mono uppercase tracking-wider">{s.label}</div>
                  </div>
                  {i < STAGES.length - 1 && <div className={`w-2 h-px ${i < stageIdx ? 'bg-zinc-600' : 'bg-zinc-800'}`}></div>}

          <div className="flex items-center justify-between mt-4">

          </div>
          <div className="bg-zinc-950 p-5">

                  <span className="font-mono text-sm text-zinc-100">{eur(project.budget)}</span>

const ClientDetail = ({ client, projects, invoices, onClose, onUpdate, onDelete, onSelectProject }) => {
  const [editing, setEditing] = useState(false);
  const [data, setData] = useState(client);
  const [confirmDel, setConfirmDel] = useState(false);
  useEscape(true, onClose);
  useEffect(() => { setData(client); }, [client]);
  if (!client) return null;

  const clientProjects = projects.filter(p => p.clientId === client.id);
  const clientInvoices = invoices.filter(i => i.clientId === client.id);
  const totalRevenue = clientInvoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.amount, 0);
  const pending = clientInvoices.filter(i => i.status !== 'paid').reduce((s, i) => s + i.amount, 0);

  const save = () => {
    if (!data.company.trim() || !data.name.trim()) return;
    onUpdate(data);
    setEditing(false);
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-in" onClick={onClose}>

            <div className="w-12 h-12 rounded-lg bg-zinc-800 flex items-center justify-center font-display text-2xl text-amber-400 flex-shrink-0">
              {client.company.charAt(0).toUpperCase()}
            </div>
            <div className="min-w-0 flex-1">
              {editing ? (
                <input value={data.company} onChange={e => setData({ ...data, company: e.target.value })} className="font-display text-2xl text-zinc-100 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 w-full" />
              ) : (
                <h2 className="font-display text-2xl text-zinc-100 truncate">{client.company}</h2>
              )}
              {editing ? (
                <input value={data.name} onChange={e => setData({ ...data, name: e.target.value })} className="text-sm text-zinc-400 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 w-full mt-1 font-body" />

                <div className="text-sm text-zinc-400 font-body truncate">{client.name}</div>

            {editing && <button onClick={save} className="px-3 h-9 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-zinc-950 text-sm font-medium">Sauvegarder</button>}
            <button onClick={onClose} className="w-9 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center"><X className="w-4 h-4" /></button>
          </div>
        </div>

        <div className="p-5 grid grid-cols-2 gap-4">
          <div className="space-y-3">
            <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Contact</div>
            <div className="flex items-center gap-2 text-sm">
              <Mail className="w-4 h-4 text-zinc-500 flex-shrink-0" />

                <input type="email" value={data.email} onChange={e => setData({ ...data, email: e.target.value })} className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-sm font-mono text-zinc-200 flex-1" />

                <a href={`mailto:${client.email}`} className="font-mono text-zinc-300 hover:text-amber-400 truncate">{client.email || '—'}</a>

          <button onClick={() => setConfirmDel(true)} className="text-sm text-rose-400 hover:text-rose-300 flex items-center gap-1 font-body">

            <div>
              <label className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-1.5 block">Échéance</label>
              <input type="date" value={data.dueDate} onChange={e => setData({ ...data, dueDate: e.target.value })} className="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 font-mono" />
            </div>
          </div>
        </div>
        <div className="p-5 border-t border-zinc-800 flex justify-end gap-2">
          <button onClick={onClose} className="text-sm px-4 py-2 text-zinc-400 hover:text-zinc-100 font-body">Annuler</button>
          <button onClick={submit} disabled={!valid} className="text-sm px-4 py-2 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-950 font-medium rounded-lg">Émettre</button>
        </div>
      </div>
    </div>
  );
};

// ============ NOTIFICATIONS DROPDOWN ============
const NotificationsPanel = ({ projects, invoices, clients, onSelectProject, onNavigate, onClose }) => {
  const ref = useRef(null);
  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener('mousedown', onClick), 0);
    return () => document.removeEventListener('mousedown', onClick);
  }, [onClose]);

  const overdueInvoices = invoices.filter(i => i.status === 'overdue');
  const upcomingDeadlines = projects
    .filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) >= 0 && daysUntil(p.deadline) <= 5)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  const overdueProjects = projects
    .filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) < 0);
  const pendingRevisions = projects
    .flatMap(p => (p.revisionHistory || []).filter(r => r.status === 'pending').map(r => ({ project: p, revision: r })))
    .sort((a, b) => new Date(a.revision.date) - new Date(b.revision.date));

  const total = overdueInvoices.length + upcomingDeadlines.length + overdueProjects.length + pendingRevisions.length;

  return (
    <div ref={ref} className="absolute right-0 top-12 w-96 bg-zinc-950 border border-zinc-800 rounded-xl shadow-2xl z-30 animate-in overflow-hidden">
      <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
        <div>
          <div className="font-display text-lg text-zinc-100">Notifications</div>
          <div className="text-xs text-zinc-500 font-mono">{total} alerte{total !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div className="max-h-96 overflow-y-auto scrollbar-thin">
        {total === 0 && (
          <div className="p-8 text-center">
            <CheckCircle2 className="w-8 h-8 text-emerald-500/60 mx-auto mb-2" />
            <div className="text-sm text-zinc-400 font-body">Tout est sous contrôle.</div>
          </div>
        )}
        {overdueInvoices.length > 0 && (
          <div>
            <div className="px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-rose-400/80 font-mono">Factures en retard</div>
            {overdueInvoices.map(inv => {
              const c = clients.find(cl => cl.id === inv.clientId);
              return (
                <button key={inv.id} onClick={() => { onClose(); onNavigate('invoices'); }} className="w-full text-left flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-900 transition-colors">
                  <span className="w-2 h-2 rounded-full bg-rose-400 flex-shrink-0 animate-pulse-slow"></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-zinc-200 truncate">{c?.company} · {inv.number}</div>
                    <div className="text-xs text-zinc-500 font-mono">Échue {fmtDate(inv.dueDate)} · {eur(inv.amount)}</div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
        {overdueProjects.length > 0 && (
          <div>
            <div className="px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-rose-400/80 font-mono">Deadlines dépassées</div>
            {overdueProjects.map(p => {
              const c = clients.find(cl => cl.id === p.clientId);
              return (
                <button key={p.id} onClick={() => { onClose(); onSelectProject(p); }} className="w-full text-left flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-900 transition-colors">
                  <span className="w-2 h-2 rounded-full bg-rose-400 flex-shrink-0"></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-zinc-200 truncate">{p.title}</div>
                    <div className="text-xs text-zinc-500 font-mono">{c?.company} · J+{Math.abs(daysUntil(p.deadline))}</div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
        {pendingRevisions.length > 0 && (
          <div>
            <div className="px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-violet-400/80 font-mono">Révisions à traiter</div>
            {pendingRevisions.map(({ project, revision }) => {
              const c = clients.find(cl => cl.id === project.clientId);
              return (
                <button key={revision.id} onClick={() => { onClose(); onSelectProject(project); }} className="w-full text-left flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-900 transition-colors">
                  <span className="w-2 h-2 rounded-full bg-violet-400 flex-shrink-0"></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-zinc-200 truncate">Round {revision.round} · {project.title}</div>
                    <div className="text-xs text-zinc-500 font-mono truncate">{c?.company} · {fmtDate(revision.date)}</div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
        {upcomingDeadlines.length > 0 && (
          <div>
            <div className="px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-amber-400/80 font-mono">Deadlines proches</div>
            {upcomingDeadlines.map(p => {
              const c = clients.find(cl => cl.id === p.clientId);
              const days = daysUntil(p.deadline);
              return (
                <button key={p.id} onClick={() => { onClose(); onSelectProject(p); }} className="w-full text-left flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-900 transition-colors">
                  <span className="w-2 h-2 rounded-full bg-amber-400 flex-shrink-0"></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-zinc-200 truncate">{p.title}</div>
                    <div className="text-xs text-zinc-500 font-mono">{c?.company} · {days === 0 ? "aujourd'hui" : `J-${days}`}</div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

// ============ MAIN APP ============
function JesseDashboard() {
  const [activeView, setActiveView] = useState('today');
  const [clients, setClients] = useState([]);
  const [projects, setProjects] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedProject, setSelectedProject] = useState(null);
  const [selectedClient, setSelectedClient] = useState(null);
  const [showNewProject, setShowNewProject] = useState(false);
  const [showNewClient, setShowNewClient] = useState(false);
  const [showNewInvoice, setShowNewInvoice] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmInvoiceDel, setConfirmInvoiceDel] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const toast = useToast();

  useEffect(() => {
    const stored = loadStore();
    const baseClients = stored?.clients || seedClients;
    const baseProjects = (stored?.projects || seedProjects).map(migrateProject);
    const baseInvoices = reconcileInvoiceStatus(stored?.invoices || seedInvoices);
    setClients(baseClients);
    setProjects(baseProjects);
    setInvoices(baseInvoices);
    setLoading(false);
    const el = document.getElementById('loading');
    if (el) el.style.display = 'none';
  }, []);

  useEffect(() => {
    if (!loading) saveStore({ clients, projects, invoices });
  }, [clients, projects, invoices, loading]);

  const updateProject = (data, opts = {}) => {
    setProjects(prev => prev.map(p => p.id === data.id ? data : p));
    if (selectedProject?.id === data.id) setSelectedProject(data);
    if (opts.toast) toast?.(opts.toast);
  };
  const deleteProject = (id) => {
    const p = projects.find(x => x.id === id);
    setProjects(prev => prev.filter(x => x.id !== id));
    setInvoices(prev => prev.filter(i => i.projectId !== id));
    toast?.(`« ${p?.title || 'Projet'} » supprimé`);
  };
  const createProject = (p) => {
    setProjects(prev => [...prev, p]);
    toast?.('Projet créé');
  };
  const duplicateProject = (project) => {
    const dup = duplicateProjectData(project);
    setProjects(prev => [...prev, dup]);
    setSelectedProject(dup);
    toast?.(`Projet dupliqué : ${dup.title}`, 'info');
  };
  const createClient = (c) => {
    setClients(prev => [...prev, c]);
    toast?.('Client ajouté');
  };
  const updateClient = (data) => {
    setClients(prev => prev.map(c => c.id === data.id ? data : c));
    if (selectedClient?.id === data.id) setSelectedClient(data);
    toast?.('Client mis à jour');
  };
  const deleteClient = (id) => {
    const c = clients.find(x => x.id === id);
    const projIds = projects.filter(p => p.clientId === id).map(p => p.id);
    setClients(prev => prev.filter(x => x.id !== id));
    setProjects(prev => prev.filter(p => p.clientId !== id));
    setInvoices(prev => prev.filter(i => i.clientId !== id && !projIds.includes(i.projectId)));
    toast?.(`${c?.company || 'Client'} supprimé`);
  };
  const updateInvoice = (id, patch) => {
    setInvoices(prev => prev.map(i => {
      if (i.id !== id) return i;
      const updated = { ...i, ...patch };
      // Sync paidAmount sur le projet quand on passe à payé
      if (patch.status === 'paid' && i.status !== 'paid') {
        setProjects(curr => curr.map(p => p.id === i.projectId ? { ...p, paidAmount: Math.min(p.budget, (p.paidAmount || 0) + i.amount) } : p));
      } else if (patch.status && patch.status !== 'paid' && i.status === 'paid') {
        setProjects(curr => curr.map(p => p.id === i.projectId ? { ...p, paidAmount: Math.max(0, (p.paidAmount || 0) - i.amount) } : p));
      }
      return updated;
    }));
    if (patch.status === 'paid') toast?.('Facture marquée payée');
  };
  const deleteInvoice = (inv) => {
    setInvoices(prev => prev.filter(i => i.id !== inv.id));
    setProjects(prev => prev.map(p => {
      if (p.id !== inv.projectId) return p;
      return {
        ...p,
        invoicedAmount: Math.max(0, (p.invoicedAmount || 0) - inv.amount),
        paidAmount: inv.status === 'paid' ? Math.max(0, (p.paidAmount || 0) - inv.amount) : p.paidAmount
      };
    }));
    toast?.('Facture supprimée');
  };
  const createInvoice = (inv) => {
    setInvoices(prev => [...prev, inv]);
    setProjects(prev => prev.map(p => p.id === inv.projectId ? { ...p, invoicedAmount: (p.invoicedAmount || 0) + inv.amount } : p));
    toast?.(`Facture ${inv.number} émise`);
  };
  const moveStage = (projectId, newStage) => {
    setProjects(prev => prev.map(p => p.id === projectId ? { ...p, stage: newStage } : p));
    const p = projects.find(x => x.id === projectId);
    const meta = STAGES.find(s => s.id === newStage);
    if (p && p.stage !== newStage) toast?.(`${p.title} → ${meta?.label}`, 'info');
  };
  const resetData = () => {
    setClients(seedClients);
    setProjects(seedProjects.map(migrateProject));
    setInvoices(reconcileInvoiceStatus(seedInvoices));
    setConfirmReset(false);
    toast?.('Données restaurées', 'info');
  };

  // Raccourci clavier global pour la recherche
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        document.getElementById('global-search')?.focus();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const navItems = [
    { id: 'today', label: "Aujourd'hui", icon: Sun },
    { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
    { id: 'projects', label: 'Projets', icon: FolderKanban },
    { id: 'calendar', label: 'Calendrier', icon: CalendarDays },
    { id: 'invoices', label: 'Facturation', icon: Receipt },
    { id: 'clients', label: 'Clients', icon: Users }
  ];

  const totalNotifs =
    invoices.filter(i => i.status === 'overdue').length +
    projects.filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) < 0).length +
    projects.filter(p => p.stage !== 'invoicing' && daysUntil(p.deadline) >= 0 && daysUntil(p.deadline) <= 5).length +
    projects.reduce((s, p) => s + (p.revisionHistory || []).filter(r => r.status === 'pending').length, 0);

  if (loading) return null;

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-200 grain font-body">
      <div className="flex min-h-screen">
        <aside className="w-60 border-r border-zinc-800/80 bg-zinc-950/95 flex flex-col">
          <div className="p-5 border-b border-zinc-800/80">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center">
                <Film className="w-5 h-5 text-zinc-950" />
              </div>
              <div>
                <div className="font-display text-xl text-zinc-100 leading-none">Jesse</div>
                <div className="text-[10px] text-zinc-500 font-mono uppercase tracking-widest">Studio OS</div>
              </div>
            </div>
          </div>

          <nav className="flex-1 p-3">
            {navItems.map(n => {
              const Icon = n.icon;
              const active = activeView === n.id;
              return (
                <button key={n.id} onClick={() => setActiveView(n.id)} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-body mb-1 transition-colors ${active ? 'bg-zinc-800 text-zinc-100' : 'text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900'}`}>
                  <Icon className="w-4 h-4" />
                  {n.label}
                </button>
              );
            })}
          </nav>

          <div className="p-3 border-t border-zinc-800/80 space-y-2">
            <div className="bg-zinc-900/60 rounded-lg p-3">
              <div className="flex items-center gap-2 mb-2">
                <Sparkles className="w-3.5 h-3.5 text-amber-400" />
                <div className="text-xs font-medium text-zinc-200">GHL connecté</div>
              </div>
              <div className="text-[11px] text-zinc-500 font-body leading-relaxed">Mock activé · webhook prêt à brancher</div>
            </div>
            <button onClick={() => setConfirmReset(true)} className="w-full flex items-center gap-2 text-[11px] text-zinc-600 hover:text-zinc-300 px-2 py-1.5 transition-colors font-mono">
              <RotateCcw className="w-3 h-3" /> Restaurer données démo
            </button>
          </div>
        </aside>

        <main className="flex-1 flex flex-col min-w-0">
          <header className="border-b border-zinc-800/80 bg-zinc-950/80 backdrop-blur-sm sticky top-0 z-20">
            <div className="flex items-center gap-4 px-6 py-3">
              <div className="flex-1 max-w-md relative">
                <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-500" />
                <input id="global-search" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Rechercher  ⌘K" className="w-full bg-zinc-900/60 border border-zinc-800 rounded-lg pl-10 pr-3 py-2 text-sm text-zinc-200 font-body focus:border-zinc-600 focus:outline-none" />
                {searchQuery && (
                  <button onClick={() => setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
                    <X className="w-3.5 h-3.5" />
                  </button>
                )}
              </div>
              <div className="text-xs text-zinc-500 font-mono">{today.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long' })}</div>
              <div className="relative">
                <button onClick={() => setShowNotifs(v => !v)} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center relative transition-colors">
                  <Bell className="w-4 h-4" />
                  {totalNotifs > 0 && <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-amber-400 text-zinc-950 text-[10px] font-bold flex items-center justify-center">{totalNotifs}</span>}
                </button>
                {showNotifs && (
                  <NotificationsPanel
                    projects={projects}
                    invoices={invoices}
                    clients={clients}
                    onSelectProject={setSelectedProject}
                    onNavigate={setActiveView}
                    onClose={() => setShowNotifs(false)}
                  />
                )}
              </div>
              <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-xs font-bold text-zinc-950">JE</div>
            </div>
          </header>

          <div className="flex-1 p-6 overflow-y-auto scrollbar-thin">
            {activeView === 'today' && (
              <TodayView projects={projects} invoices={invoices} clients={clients} onSelectProject={setSelectedProject} onUpdateProject={updateProject} onUpdateInvoice={updateInvoice} onNavigate={setActiveView} />
            )}
            {activeView === 'dashboard' && (
              <DashboardView projects={projects} invoices={invoices} clients={clients} onSelectProject={setSelectedProject} onNewProject={() => setShowNewProject(true)} />
            )}
            {activeView === 'projects' && (
              <ProjectsView projects={projects} clients={clients} onSelectProject={setSelectedProject} onNewProject={() => setShowNewProject(true)} searchQuery={searchQuery} onMoveStage={moveStage} />
            )}
            {activeView === 'calendar' && (
              <CalendarView projects={projects} clients={clients} invoices={invoices} onSelectProject={setSelectedProject} />
            )}
            {activeView === 'invoices' && (
              <InvoicesView invoices={invoices} clients={clients} projects={projects} onUpdateInvoice={updateInvoice} onNewInvoice={() => setShowNewInvoice(true)} onDeleteInvoice={(inv) => setConfirmInvoiceDel(inv)} searchQuery={searchQuery} disableNew={projects.length === 0} />
            )}
            {activeView === 'clients' && (
              <ClientsView clients={clients} projects={projects} invoices={invoices} onNewClient={() => setShowNewClient(true)} onSelectClient={setSelectedClient} searchQuery={searchQuery} />
            )}
          </div>
        </main>
      </div>

      {selectedProject && <ProjectDetail project={selectedProject} clients={clients} invoices={invoices} onClose={() => setSelectedProject(null)} onUpdate={updateProject} onDelete={deleteProject} onUpdateInvoice={updateInvoice} onDuplicate={duplicateProject} />}
      {selectedClient && <ClientDetail client={selectedClient} projects={projects} invoices={invoices} onClose={() => setSelectedClient(null)} onUpdate={updateClient} onDelete={deleteClient} onSelectProject={setSelectedProject} />}
      {showNewProject && <NewProjectModal clients={clients} onClose={() => setShowNewProject(false)} onCreate={createProject} onCreateClient={() => setShowNewClient(true)} />}
      {showNewClient && <NewClientModal onClose={() => setShowNewClient(false)} onCreate={createClient} />}
      {showNewInvoice && <NewInvoiceModal projects={projects} clients={clients} invoices={invoices} onClose={() => setShowNewInvoice(false)} onCreate={createInvoice} />}

      <ConfirmModal
        open={confirmReset}
        title="Restaurer les données de démo ?"
        message="Toutes vos modifications locales seront écrasées par le jeu de données initial."
        confirmLabel="Restaurer"
        danger
        onCancel={() => setConfirmReset(false)}
        onConfirm={resetData}
      />
      <ConfirmModal
        open={!!confirmInvoiceDel}
        title={`Supprimer la facture ${confirmInvoiceDel?.number} ?`}
        message="Cette action est irréversible. Le montant sera retiré du facturé du projet."
        confirmLabel="Supprimer"
        danger
        onCancel={() => setConfirmInvoiceDel(null)}
        onConfirm={() => { deleteInvoice(confirmInvoiceDel); setConfirmInvoiceDel(null); }}
      />
    </div>
  );
}

createRoot(document.getElementById('root')).render(
  <ToastProvider>
    <JesseDashboard />
  </ToastProvider>
);
</script>
</body>
</html>
