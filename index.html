<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useMemo, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import {
  LayoutDashboard, FolderKanban, CalendarDays, Receipt, Users, Plus,
  Search, Bell, ChevronRight, ChevronLeft, X, Edit3,
  Trash2, Clock, FileVideo, CheckCircle2, AlertCircle,
  Film, Sparkles, TrendingUp, ExternalLink, Download, RotateCcw,
  Check, Mail, Phone, Building2, Inbox,
  ListTodo, Link2, PlayCircle, Play, Pause, Cloud, MessageSquare, GripVertical,
  Send, HardDrive, Youtube, Square, CheckSquare,
  Sun, Copy, Files, Zap, ArrowRight, LogIn, LogOut, Lock,
  Shield, UserPlus, MoreVertical, KeyRound, Eye, UserCog, MailPlus, ShieldCheck, ShieldAlert
} from 'lucide-react';
import { BarChart, Bar, XAxis, YAxis, ResponsiveContainer, Tooltip, CartesianGrid } from 'recharts';
import { createClient } from '@supabase/supabase-js';

// ============ AUTH (Supabase) ============
const SUPABASE_URL = 'https://qwpleaozgcjegzfzcneo.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_nYDCcbs1amfjw0d1IqZxjg_mGY8En7K';
const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
});

// ============ CONFIG ============
const STAGES = [
  { id: 'onboarding', label: 'Onboarding', color: 'sky' },
  { id: 'production', label: 'Production', color: 'amber' },
  { id: 'review', label: 'Validation client', color: 'violet' },
  { id: 'validated', label: 'Validé', color: 'emerald' },
  { id: 'invoicing', label: 'Facturation', color: 'rose' },
  { id: 'paid', label: 'Encaissé', color: 'green' }
];

// Étapes clôturées : projet sorti du flux de prod (la deadline ne compte plus, plus de tâches en attente).
const isClosedStage = (id) => id === 'invoicing' || id === 'paid';

const STAGE_COLORS = {
  sky: { bg: 'bg-sky-500/10', text: 'text-sky-300', border: 'border-sky-500/30', dot: 'bg-sky-400' },
  amber: { bg: 'bg-amber-500/10', text: 'text-amber-300', border: 'border-amber-500/30', dot: 'bg-amber-400' },
  violet: { bg: 'bg-violet-500/10', text: 'text-violet-300', border: 'border-violet-500/30', dot: 'bg-violet-400' },
  emerald: { bg: 'bg-emerald-500/10', text: 'text-emerald-300', border: 'border-emerald-500/30', dot: 'bg-emerald-400' },
  rose: { bg: 'bg-rose-500/10', text: 'text-rose-300', border: 'border-rose-500/30', dot: 'bg-rose-400' },
  green: { bg: 'bg-green-500/10', text: 'text-green-300', border: 'border-green-500/30', dot: 'bg-green-400' }
};

const PROJECT_TYPES = ['Publicité', 'Corporate', 'Social Media', 'Clip musical', 'Documentaire', 'Événement', 'Mariage', 'Aftermovie'];

// Templates de tâches par type de projet (workflow post-prod typique)
const TASK_TEMPLATES = {
  'Publicité': ['Brief & moodboard', 'Storyboard', 'Tournage', 'Dérushage', 'Cut V1', 'Étalonnage', 'Mixage audio', 'Export master', 'Livraison client'],
  'Corporate': ['Brief', 'Tournage', 'Dérushage', 'Cut V1', 'Voix off', 'Étalonnage', 'Mixage audio', 'Export', 'Livraison'],
  'Social Media': ['Brief', 'Dérushage', 'Cut court', 'Sous-titrage', 'Export 9:16', 'Export 1:1', 'Livraison'],
  'Clip musical': ['Brief & repérage', 'Storyboard', 'Tournage', 'Dérushage', 'Cut V1', 'VFX', 'Étalonnage', 'Master audio sync', 'Export'],
  'Documentaire': ['Recherche', 'Interviews', 'Tournage B-roll', 'Dérushage', 'Sélection', 'Cut V1', 'Étalonnage', 'Mixage', 'Export'],
  'Événement': ['Tournage multi-cam', 'Dérushage', 'Synchro audio', 'Cut V1', 'Étalonnage léger', 'Export', 'Livraison'],
  'Mariage': ['Tournage J-J', 'Dérushage', 'Sélection moments forts', 'Teaser 1min', 'Film court 5min', 'Film complet', 'Étalonnage', 'Mix audio', 'Livraison galerie'],
  'Aftermovie': ['Tournage', 'Dérushage', 'Sélection energy moments', 'Cut au rythme', 'Étalonnage', 'Mix musique/ambiance', 'Export', 'Livraison']
};

const DELIVERABLE_KINDS = {
  frameio:    { label: 'Frame.io',     icon: PlayCircle, color: 'text-violet-300', bg: 'bg-violet-500/10', border: 'border-violet-500/30' },
  drive:      { label: 'Google Drive', icon: HardDrive,  color: 'text-sky-300',    bg: 'bg-sky-500/10',    border: 'border-sky-500/30' },
  wetransfer: { label: 'WeTransfer',   icon: Send,       color: 'text-cyan-300',   bg: 'bg-cyan-500/10',   border: 'border-cyan-500/30' },
  dropbox:    { label: 'Dropbox',      icon: Cloud,      color: 'text-blue-300',   bg: 'bg-blue-500/10',   border: 'border-blue-500/30' },
  youtube:    { label: 'YouTube',      icon: Youtube,    color: 'text-rose-300',   bg: 'bg-rose-500/10',   border: 'border-rose-500/30' },
  vimeo:      { label: 'Vimeo',        icon: PlayCircle, color: 'text-teal-300',   bg: 'bg-teal-500/10',   border: 'border-teal-500/30' },
  other:      { label: 'Autre',        icon: Link2,      color: 'text-zinc-300',   bg: 'bg-zinc-700/30',   border: 'border-zinc-600' }
};

// Détecte le type de livrable depuis l'URL (best effort)
const guessKind = (url) => {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('frame.io') || u.includes('f.io')) return 'frameio';
  if (u.includes('drive.google') || u.includes('docs.google')) return 'drive';
  if (u.includes('wetransfer') || u.includes('we.tl')) return 'wetransfer';
  if (u.includes('dropbox')) return 'dropbox';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('vimeo.com')) return 'vimeo';
  return 'other';
};

// Génération d'identifiants UUID v4 — compatibles avec les colonnes uuid Supabase.
// Fallback si crypto.randomUUID indisponible (vieux navigateurs / contextes non sécurisés).
const newId = () => {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
  });
};

const buildDefaultTasks = (type) => {
  const labels = TASK_TEMPLATES[type] || ['Brief', 'Production', 'Montage', 'Livraison'];
  return labels.map((label, i) => ({ id: newId(), label, done: false, order: i }));
};

// Copie texte dans le presse-papier (best effort)
const copyText = async (text) => {
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch { return false; }
};

const firstName = (full) => (full || '').split(' ')[0] || '';

// Templates d'emails FR pour les moments-clés du flux monteur ↔ client
const EMAIL_TEMPLATES = {
  review: (project, client, deliverable) => ({
    subject: `${deliverable.label} — ${project.title}`,
    body: `Salut ${firstName(client?.name)},

Voici ${deliverable.label.toLowerCase()} pour ${project.title} :
${deliverable.url}

N'hésite pas à me faire un retour quand tu peux, idéalement consolidé en une seule réponse pour gagner du temps des deux côtés.

Belle journée,
Jessy`
  }),
  delivered: (project, client, deliverable) => ({
    subject: `${project.title} — Livraison`,
    body: `Salut ${firstName(client?.name)},

Le master de ${project.title} est livré :
${deliverable.url}

Merci pour la confiance sur ce projet.

À très vite,
Jessy`
  }),
  reminder: (project, client) => ({
    subject: `${project.title} — Petit point`,
    body: `Salut ${firstName(client?.name)},

Petit rappel sur ${project.title} : il me faudrait tes retours pour passer à la suite.
Quand ça t'arrange, mais on est en deadline.

Merci,
Jessy`
  }),
  invoiceReminder: (invoice, project, client) => ({
    subject: `Relance facture ${invoice.number}`,
    body: `Bonjour ${firstName(client?.name)},

Je me permets de revenir vers toi concernant la facture ${invoice.number} (${eur(invoice.amount)}) émise le ${fmtDateLong(invoice.issueDate)} et échue le ${fmtDateLong(invoice.dueDate)}, qui semble encore en attente de règlement.

Merci de me confirmer le paiement ou de me signaler tout souci.

Bien cordialement,
Jessy`
  })
};

const buildMailto = (email, { subject, body }) => {
  const params = new URLSearchParams();
  if (subject) params.set('subject', subject);
  if (body) params.set('body', body);
  // mailto encode espaces en + par URLSearchParams; certains clients préfèrent %20
  const qs = params.toString().replace(/\+/g, '%20');
  return `mailto:${email || ''}?${qs}`;
};

// Duplique un projet : recopie type/budget/notes/tâches mais reset état & dates
const duplicateProjectData = (project) => ({
  ...project,
  id: newId(),
  title: project.title + ' (copie)',
  stage: 'onboarding',
  startDate: today.toISOString().slice(0, 10),
  deadline: dateOffset(14),
  invoicedAmount: 0,
  paidAmount: 0,
  tasks: (project.tasks || []).map((t, i) => ({ id: newId(), label: t.label, done: false, order: i })),
  deliverables: [],
  revisionHistory: [],
  createdAt: today.toISOString().slice(0, 10)
});

// Renvoie la prochaine tâche non cochée d'un projet (pour les vues focus)
const nextPendingTask = (project) => (project.tasks || []).find(t => !t.done) || null;

// ============ DATE & EMPTY STATE ============
const today = new Date();
const dateOffset = (days) => { const d = new Date(today); d.setDate(d.getDate() + days); return d.toISOString().slice(0, 10); };

const seedClients = [];
const seedProjects = [];
const seedInvoices = [];

// Migration : projets stockés en localStorage avant ajout des nouveaux champs
const migrateProject = (p) => ({
  ...p,
  tasks: Array.isArray(p.tasks) ? p.tasks : buildDefaultTasks(p.type),
  deliverables: Array.isArray(p.deliverables) ? p.deliverables : [],
  revisionHistory: Array.isArray(p.revisionHistory) ? p.revisionHistory : [],
  hoursLogged: typeof p.hoursLogged === 'number' ? p.hoursLogged : 0
});

// ============ HELPERS ============
const eur = (n) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n || 0);
const fmtDate = (s) => s ? new Date(s).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) : '—';
const fmtDateLong = (s) => s ? new Date(s).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }) : '—';
const daysUntil = (d) => Math.ceil((new Date(d) - today) / 86400000);
const stageMeta = (id) => STAGES.find(s => s.id === id) || STAGES[0];

// Timer: format H:MM:SS / M:SS et conversion en heures arrondies au quart (min 0.25h)
const formatElapsed = (ms) => {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const pad = (n) => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
};
const elapsedToHours = (ms) => Math.max(0.25, Math.round(ms / 1000 / 60 / 15) * 15 / 60);

// ============ STORAGE (localStorage) ============
const STORAGE_KEY = 'jessy-dashboard-v1';
const loadStore = () => {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
  catch { return null; }
};
const saveStore = (data) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch (e) { console.error(e); }
};

// Détecte automatiquement les factures en retard (pending au-delà de la date d'échéance)
const reconcileInvoiceStatus = (invoices) =>
  invoices.map(i => (i.status === 'pending' && daysUntil(i.dueDate) < 0) ? { ...i, status: 'overdue' } : i);

// ============ TOAST SYSTEM ============
const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

const ToastProvider = ({ children }) => {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((message, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div className="fixed bottom-6 right-6 z-[100] space-y-2 pointer-events-none">
        {toasts.map(t => {
          const map = {
            success: { bg: 'bg-emerald-500/15', border: 'border-emerald-500/40', text: 'text-emerald-200', icon: CheckCircle2 },
            error: { bg: 'bg-rose-500/15', border: 'border-rose-500/40', text: 'text-rose-200', icon: AlertCircle },
            info: { bg: 'bg-sky-500/15', border: 'border-sky-500/40', text: 'text-sky-200', icon: Sparkles }
          };
          const c = map[t.type] || map.success;
          const Icon = c.icon;
          return (
            <div key={t.id} className={`${c.bg} ${c.border} ${c.text} backdrop-blur-md border rounded-lg px-4 py-3 shadow-lg flex items-center gap-2.5 animate-in pointer-events-auto min-w-[220px]`}>
              <Icon className="w-4 h-4 flex-shrink-0" />
              <span className="text-sm font-body">{t.message}</span>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
};

// ============ CONFIRM MODAL ============
const ConfirmModal = ({ open, title, message, confirmLabel = 'Confirmer', danger = false, onConfirm, onCancel }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-[90] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-in" onClick={onCancel}>
      <div className="bg-zinc-950 border border-zinc-800 rounded-xl w-full max-w-sm" onClick={e => e.stopPropagation()}>
        <div className="p-5">
          <h3 className="font-display text-xl text-zinc-100 mb-2">{title}</h3>
          <p className="text-sm text-zinc-400 font-body">{message}</p>
        </div>
        <div className="p-5 pt-0 flex justify-end gap-2">
          <button onClick={onCancel} className="text-sm px-4 py-2 text-zinc-400 hover:text-zinc-100 font-body">Annuler</button>
          <button onClick={onConfirm} className={`text-sm px-4 py-2 font-medium rounded-lg ${danger ? 'bg-rose-500 hover:bg-rose-400 text-zinc-50' : 'bg-amber-500 hover:bg-amber-400 text-zinc-950'}`}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
};

// ============ MODAL SHELL (gère ESC) ============
const useEscape = (active, handler) => {
  useEffect(() => {
    if (!active) return;
    const onKey = (e) => { if (e.key === 'Escape') handler(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [active, handler]);
};

// ============ COMPONENTS ============
const StagePill = ({ stage, size = 'sm' }) => {
  const meta = stageMeta(stage);
  const c = STAGE_COLORS[meta.color];
  const sizing = size === 'sm' ? 'text-xs px-2 py-0.5' : 'text-sm px-3 py-1';
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full font-medium font-body ${c.bg} ${c.text} ${c.border} border ${sizing}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
      {meta.label}
    </span>
  );
};

const StatusPill = ({ status }) => {
  const map = {
    paid: { bg: 'bg-emerald-500/10', text: 'text-emerald-300', label: 'Payée', dot: 'bg-emerald-400' },
    pending: { bg: 'bg-amber-500/10', text: 'text-amber-300', label: 'En attente', dot: 'bg-amber-400' },
    overdue: { bg: 'bg-rose-500/10', text: 'text-rose-300', label: 'En retard', dot: 'bg-rose-400 animate-pulse-slow' }
  };
  const c = map[status] || map.pending;
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-full text-xs font-medium px-2 py-0.5 ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>{c.label}
    </span>
  );
};

const KPICard = ({ label, value, sub, accent = 'amber', icon: Icon }) => (
  <div className="bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-5 hover:border-zinc-700 transition-colors">
    <div className="flex items-start justify-between mb-3">
      <span className="text-xs uppercase tracking-widest text-zinc-500 font-mono">{label}</span>
      {Icon && <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${accent === 'amber' ? 'bg-amber-500/10 text-amber-400' : accent === 'emerald' ? 'bg-emerald-500/10 text-emerald-400' : accent === 'rose' ? 'bg-rose-500/10 text-rose-400' : 'bg-sky-500/10 text-sky-400'}`}><Icon className="w-4 h-4" /></div>}
    </div>
    <div className="font-display text-3xl text-zinc-100 mb-1 tracking-tight">{value}</div>
    {sub && <div className="text-xs text-zinc-500 font-body">{sub}</div>}
  </div>
);

// ============ SEARCH HELPER ============
const matchesQuery = (q, ...fields) => {
  if (!q) return true;
  const needle = q.toLowerCase().trim();
  return fields.some(f => (f || '').toString().toLowerCase().includes(needle));
};

// ============ TODAY (FOCUS) VIEW ============
const TodayView = ({ projects, invoices, clients, onSelectProject, onUpdateProject, onUpdateInvoice, onNavigate }) => {
  const toast = useToast();
  const hour = today.getHours();
  const greet = hour < 5 ? 'Bonne nuit' : hour < 12 ? 'Bonjour' : hour < 18 ? 'Bon après-midi' : 'Bonsoir';

  const overdueInvoices = invoices.filter(i => i.status === 'overdue');
  const pendingRevisions = projects
    .flatMap(p => (p.revisionHistory || []).filter(r => r.status === 'pending').map(r => ({ project: p, revision: r })))
    .sort((a, b) => new Date(a.revision.date) - new Date(b.revision.date));
  const urgentDeadlines = projects
    .filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) <= 3)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  const activeWithNextTask = projects
    .filter(p => !isClosedStage(p.stage) && p.stage !== 'validated' && nextPendingTask(p))
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  const total = overdueInvoices.length + pendingRevisions.length + urgentDeadlines.length;

  const tickNextTask = (project) => {
    const next = nextPendingTask(project);
    if (!next) return;
    const tasks = (project.tasks || []).map(t => t.id === next.id ? { ...t, done: true } : t);
    onUpdateProject({ ...project, tasks });
    toast?.(`✓ ${next.label}`);
  };
  const logHour = (project) => {
    const next = Math.round(((project.hoursLogged || 0) + 1) * 2) / 2;
    onUpdateProject({ ...project, hoursLogged: next });
    toast?.(`+1h · ${project.title} (${next}h)`, 'info');
  };

  const sendInvoiceReminder = (inv) => {
    const client = clients.find(c => c.id === inv.clientId);
    const project = projects.find(p => p.id === inv.projectId);
    const tpl = EMAIL_TEMPLATES.invoiceReminder(inv, project, client);
    if (!client?.email) {
      copyText(`${tpl.subject}\n\n${tpl.body}`).then(ok => toast?.(ok ? 'Email copié (pas d\'adresse client)' : 'Erreur', ok ? 'info' : 'error'));
      return;
    }
    window.location.href = buildMailto(client.email, tpl);
  };

  return (
    <div className="space-y-6 animate-in">
      <div className="flex items-end justify-between flex-wrap gap-4">
        <div>
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-2 flex items-center gap-2">
            <Sun className="w-3 h-3" />
            {today.toLocaleDateString('fr-FR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })}
          </div>
          <h1 className="font-display text-4xl text-zinc-100 tracking-tight">{greet}.</h1>
          <p className="text-sm text-zinc-500 mt-1 font-body">
            {total === 0
              ? 'Tout est sous contrôle. Profite ☕️'
              : `${total} chose${total > 1 ? 's' : ''} qui demande${total > 1 ? 'nt' : ''} ton attention`}
          </p>
        </div>
      </div>

      {/* Révisions à traiter — la priorité absolue d'un monteur */}
      {pendingRevisions.length > 0 && (
        <section className="bg-violet-500/5 border border-violet-500/20 rounded-xl overflow-hidden">
          <div className="px-5 py-3 border-b border-violet-500/20 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <MessageSquare className="w-4 h-4 text-violet-300" />
              <h2 className="font-display text-lg text-violet-200">Retours client à traiter</h2>
            </div>
            <span className="text-xs font-mono text-violet-300/70">{pendingRevisions.length}</span>
          </div>
          <div className="divide-y divide-violet-500/10">
            {pendingRevisions.map(({ project, revision }) => {
              const c = clients.find(cl => cl.id === project.clientId);
              return (
                <button key={revision.id} onClick={() => onSelectProject(project)} className="w-full text-left p-4 hover:bg-violet-500/5 transition-colors group">
                  <div className="flex items-start gap-3">
                    <span className="px-2 py-0.5 bg-violet-500/15 text-violet-300 rounded-full text-[10px] font-mono whitespace-nowrap">Round {revision.round}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-sm text-zinc-100 font-medium truncate">{project.title}</span>
                        <span className="text-xs text-zinc-500 font-mono">{c?.company}</span>
                      </div>
                      <div className="text-sm text-zinc-300 font-body line-clamp-2">{revision.feedback}</div>
                      <div className="text-[10px] text-zinc-600 font-mono mt-1">{fmtDate(revision.date)}</div>
                    </div>
                    <ArrowRight className="w-4 h-4 text-violet-400/50 group-hover:text-violet-300 mt-1 flex-shrink-0" />
                  </div>
                </button>
              );
            })}
          </div>
        </section>
      )}

      {/* Tâches en cours par projet actif */}
      {activeWithNextTask.length > 0 && (
        <section className="bg-zinc-900/40 border border-zinc-800 rounded-xl overflow-hidden">
          <div className="px-5 py-3 border-b border-zinc-800 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Zap className="w-4 h-4 text-amber-300" />
              <h2 className="font-display text-lg text-zinc-100">Prochaines tâches</h2>
            </div>
            <span className="text-xs font-mono text-zinc-500">{activeWithNextTask.length} projet{activeWithNextTask.length > 1 ? 's' : ''}</span>
          </div>
          <div className="divide-y divide-zinc-800/60">
            {activeWithNextTask.map(p => {
              const next = nextPendingTask(p);
              const c = clients.find(cl => cl.id === p.clientId);
              const days = daysUntil(p.deadline);
              const overdue = days < 0;
              const urgent = days >= 0 && days <= 3;
              const totalT = (p.tasks || []).length;
              const doneT = (p.tasks || []).filter(t => t.done).length;
              return (
                <div key={p.id} className="flex items-center gap-3 p-4 hover:bg-zinc-900/40 transition-colors group">
                  <button
                    onClick={() => tickNextTask(p)}
                    title="Cocher cette tâche"
                    className="w-5 h-5 rounded border-2 border-zinc-600 hover:border-emerald-400 hover:bg-emerald-500/20 transition-colors flex items-center justify-center flex-shrink-0"
                  >
                    <Check className="w-3 h-3 text-transparent group-hover:text-emerald-400 transition-colors" />
                  </button>
                  <button onClick={() => onSelectProject(p)} className="flex-1 min-w-0 text-left">
                    <div className="text-sm text-zinc-100 font-medium truncate">{next.label}</div>
                    <div className="text-xs text-zinc-500 font-body truncate">
                      <span className="text-zinc-400">{p.title}</span>
                      <span className="mx-1.5 text-zinc-700">·</span>
                      {c?.company}
                      <span className="mx-1.5 text-zinc-700">·</span>
                      <span className="font-mono">{doneT}/{totalT}</span>
                      {(p.hoursLogged || 0) > 0 && <><span className="mx-1.5 text-zinc-700">·</span><span className="font-mono">{p.hoursLogged}h</span></>}
                    </div>
                  </button>
                  <button
                    onClick={() => logHour(p)}
                    title="Logger 1 heure"
                    className="text-[10px] text-amber-300 hover:text-amber-200 px-2 py-1 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 rounded font-mono transition-colors flex-shrink-0"
                  >
                    +1h
                  </button>
                  <div className="text-right flex-shrink-0 min-w-[3rem]">
                    <div className={`text-xs font-mono ${overdue ? 'text-rose-400' : urgent ? 'text-amber-400' : 'text-zinc-500'}`}>
                      {overdue ? `J+${Math.abs(days)}` : days === 0 ? "Auj." : `J-${days}`}
                    </div>
                    <div className="text-[10px] text-zinc-600 font-mono">{fmtDate(p.deadline)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {/* Deadlines urgentes (incluant aujourd'hui & passées non-archivées) */}
      {urgentDeadlines.length > 0 && (
        <section className="bg-amber-500/5 border border-amber-500/20 rounded-xl overflow-hidden">
          <div className="px-5 py-3 border-b border-amber-500/20 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Clock className="w-4 h-4 text-amber-300" />
              <h2 className="font-display text-lg text-amber-200">Échéances chaudes</h2>
            </div>
            <span className="text-xs font-mono text-amber-300/70">{urgentDeadlines.length}</span>
          </div>
          <div className="divide-y divide-amber-500/10">
            {urgentDeadlines.map(p => {
              const c = clients.find(cl => cl.id === p.clientId);
              const days = daysUntil(p.deadline);
              const overdue = days < 0;
              return (
                <button key={p.id} onClick={() => onSelectProject(p)} className="w-full text-left p-4 hover:bg-amber-500/5 transition-colors group flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-sm text-zinc-100 font-medium truncate">{p.title}</span>
                      <StagePill stage={p.stage} />
                    </div>
                    <div className="text-xs text-zinc-500 font-body">{c?.company} · {p.type}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className={`font-mono text-sm ${overdue ? 'text-rose-400' : 'text-amber-400'}`}>{fmtDate(p.deadline)}</div>
                    <div className="text-xs text-zinc-500 font-mono">{overdue ? `J+${Math.abs(days)} retard` : days === 0 ? "aujourd'hui" : `J-${days}`}</div>
                  </div>
                  <ArrowRight className="w-4 h-4 text-amber-400/50 group-hover:text-amber-300 flex-shrink-0" />
                </button>
              );
            })}
          </div>
        </section>
      )}

      {/* Factures en retard */}
      {overdueInvoices.length > 0 && (
        <section className="bg-rose-500/5 border border-rose-500/20 rounded-xl overflow-hidden">
          <div className="px-5 py-3 border-b border-rose-500/20 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <AlertCircle className="w-4 h-4 text-rose-300" />
              <h2 className="font-display text-lg text-rose-200">Factures à relancer</h2>
            </div>
            <span className="text-xs font-mono text-rose-300/70">{eur(overdueInvoices.reduce((s, i) => s + i.amount, 0))}</span>
          </div>
          <div className="divide-y divide-rose-500/10">
            {overdueInvoices.map(inv => {
              const c = clients.find(cl => cl.id === inv.clientId);
              return (
                <div key={inv.id} className="flex items-center gap-3 p-4">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-zinc-100 font-medium truncate">{c?.company} · {inv.number}</div>
                    <div className="text-xs text-zinc-500 font-mono">Échue {fmtDate(inv.dueDate)} · J+{Math.abs(daysUntil(inv.dueDate))}</div>
                  </div>
                  <div className="font-mono text-sm text-rose-300 flex-shrink-0">{eur(inv.amount)}</div>
                  <button onClick={() => sendInvoiceReminder(inv)} className="text-xs text-amber-300 hover:text-amber-200 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 px-2 py-1 rounded inline-flex items-center gap-1 font-body transition-colors flex-shrink-0">
                    <Send className="w-3 h-3" /> Relancer
                  </button>
                  <button onClick={() => onUpdateInvoice(inv.id, { status: 'paid', paidDate: today.toISOString().slice(0, 10) })} className="text-xs text-emerald-400 hover:text-emerald-300 font-body whitespace-nowrap flex-shrink-0">
                    <Check className="w-3 h-3 inline" /> Payée
                  </button>
                </div>
              );
            })}
          </div>
        </section>
      )}

      {total === 0 && activeWithNextTask.length === 0 && (
        <div className="bg-zinc-900/40 border border-zinc-800 border-dashed rounded-xl p-12 text-center">
          <CheckCircle2 className="w-10 h-10 text-emerald-500/60 mx-auto mb-3" />
          <div className="font-display text-2xl text-zinc-100 mb-1">Inbox zéro 🎬</div>
          <div className="text-sm text-zinc-500 font-body">Aucune révision en attente, aucune deadline urgente, aucune facture en retard.</div>
          <button onClick={() => onNavigate('projects')} className="mt-4 text-sm text-amber-400 hover:text-amber-300 font-body">Voir le pipeline →</button>
        </div>
      )}
    </div>
  );
};

// ============ DASHBOARD VIEW ============
const DashboardView = ({ projects, invoices, clients, onSelectProject, onNewProject }) => {
  const activeProjects = projects.filter(p => !isClosedStage(p.stage) || p.invoicedAmount > p.paidAmount);
  const totalPaid = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.amount, 0);
  const totalPending = invoices.filter(i => i.status === 'pending').reduce((s, i) => s + i.amount, 0);
  const totalOverdue = invoices.filter(i => i.status === 'overdue').reduce((s, i) => s + i.amount, 0);

  const pipeline = STAGES.map(s => ({
    ...s,
    count: projects.filter(p => p.stage === s.id).length,
    value: projects.filter(p => p.stage === s.id).reduce((sum, p) => sum + p.budget, 0)
  }));

  const upcomingDeadlines = [...projects]
    .filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) >= -3 && daysUntil(p.deadline) <= 21)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
    .slice(0, 6);

  const chartData = useMemo(() => {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(today); d.setMonth(d.getMonth() - i); d.setDate(1);
      months.push({
        label: d.toLocaleDateString('fr-FR', { month: 'short' }),
        month: d.getMonth(), year: d.getFullYear(),
        paid: 0
      });
    }
    invoices.forEach(inv => {
      if (inv.paidDate) {
        const d = new Date(inv.paidDate);
        const m = months.find(x => x.month === d.getMonth() && x.year === d.getFullYear());
        if (m) m.paid += inv.amount;
      }
    });
    return months;
  }, [invoices]);

  return (
    <div className="space-y-6 animate-in">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-2">Tableau de bord — {fmtDateLong(today.toISOString())}</div>
          <h1 className="font-display text-4xl text-zinc-100 tracking-tight">Bonsoir.</h1>
        </div>
        <button onClick={onNewProject} className="bg-amber-500 hover:bg-amber-400 text-zinc-950 font-medium font-body text-sm px-4 py-2.5 rounded-lg flex items-center gap-2 transition-colors">
          <Plus className="w-4 h-4" /> Nouveau projet
        </button>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <KPICard label="Encaissé · 6 mois" value={eur(totalPaid)} sub={`${invoices.filter(i => i.status === 'paid').length} factures réglées`} accent="emerald" icon={TrendingUp} />
        <KPICard label="En attente" value={eur(totalPending)} sub={`${invoices.filter(i => i.status === 'pending').length} factures émises`} accent="amber" icon={Clock} />
        <KPICard label="En retard" value={eur(totalOverdue)} sub={`${invoices.filter(i => i.status === 'overdue').length} à relancer`} accent="rose" icon={AlertCircle} />
        <KPICard label="Projets actifs" value={activeProjects.length} sub={`${clients.length} clients · ${eur(activeProjects.reduce((s, p) => s + p.budget, 0))} en cours`} accent="sky" icon={FileVideo} />
      </div>

      <div className="bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-display text-xl text-zinc-100">Pipeline</h2>
          <span className="text-xs text-zinc-500 font-mono">{projects.length} projets</span>
        </div>
        <div className="grid grid-cols-6 gap-3">
          {pipeline.map(s => {
            const c = STAGE_COLORS[s.color];
            return (
              <div key={s.id} className={`${c.bg} ${c.border} border rounded-lg p-4`}>
                <div className="flex items-center gap-2 mb-3">
                  <span className={`w-2 h-2 rounded-full ${c.dot}`}></span>
                  <span className={`text-xs font-medium ${c.text}`}>{s.label}</span>
                </div>
                <div className="font-display text-3xl text-zinc-100 leading-none mb-1">{s.count}</div>
                <div className="text-xs text-zinc-500 font-mono">{eur(s.value)}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="grid grid-cols-3 gap-4">
        <div className="col-span-2 bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-display text-xl text-zinc-100">Deadlines à venir</h2>
            <span className="text-xs text-zinc-500 font-mono">{upcomingDeadlines.length} échéances</span>
          </div>
          <div className="space-y-2">
            {upcomingDeadlines.length === 0 && <div className="text-sm text-zinc-500 py-4">Aucune deadline imminente.</div>}
            {upcomingDeadlines.map(p => {
              const client = clients.find(c => c.id === p.clientId);
              const days = daysUntil(p.deadline);
              const urgent = days <= 3;
              const overdue = days < 0;
              return (
                <button key={p.id} onClick={() => onSelectProject(p)} className="w-full flex items-center gap-4 p-3 rounded-lg hover:bg-zinc-800/50 transition-colors text-left group">
                  <div className={`w-1 h-10 rounded-full ${overdue ? 'bg-rose-500' : urgent ? 'bg-amber-500' : 'bg-zinc-700'}`}></div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-zinc-100 font-medium truncate">{p.title}</span>
                      <StagePill stage={p.stage} />
                    </div>
                    <div className="text-xs text-zinc-500 font-body">{client?.company} · {p.type}</div>
                  </div>
                  <div className="text-right">
                    <div className={`font-mono text-sm ${overdue ? 'text-rose-400' : urgent ? 'text-amber-400' : 'text-zinc-300'}`}>{fmtDate(p.deadline)}</div>
                    <div className="text-xs text-zinc-500 font-mono">{overdue ? `J+${Math.abs(days)}` : days === 0 ? "aujourd'hui" : `J-${days}`}</div>
                  </div>
                  <ChevronRight className="w-4 h-4 text-zinc-600 group-hover:text-zinc-300 transition-colors" />
                </button>
              );
            })}
          </div>
        </div>

        <div className="bg-zinc-900/60 border border-zinc-800/80 rounded-xl p-5">
          <h2 className="font-display text-xl text-zinc-100 mb-4">Cash-flow</h2>
          <div className="h-48 -mx-2">
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={chartData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#27272a" vertical={false} />
                <XAxis dataKey="label" tick={{ fill: '#71717a', fontSize: 11 }} axisLine={false} tickLine={false} />
                <YAxis tick={{ fill: '#71717a', fontSize: 10 }} axisLine={false} tickLine={false} tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
                <Tooltip contentStyle={{ background: '#18181b', border: '1px solid #3f3f46', borderRadius: 8, fontSize: 12 }} formatter={v => eur(v)} />
                <Bar dataKey="paid" fill="#10b981" radius={[3, 3, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="text-xs text-zinc-500 font-body mt-2">Encaissements mensuels — 6 derniers mois</div>
        </div>
      </div>
    </div>
  );
};

// ============ PROJECTS VIEW (KANBAN) ============
const ProjectsView = ({ projects, clients, onSelectProject, onNewProject, searchQuery, onMoveStage }) => {
  const [filterClient, setFilterClient] = useState('all');
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const filtered = projects.filter(p => {
    if (filterClient !== 'all' && p.clientId !== filterClient) return false;
    const client = clients.find(c => c.id === p.clientId);
    return matchesQuery(searchQuery, p.title, p.type, p.notes, client?.company, client?.name);
  });

  return (
    <div className="space-y-6 animate-in">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-2">Projets</div>
          <h1 className="font-display text-4xl text-zinc-100 tracking-tight">Pipeline</h1>
        </div>
        <div className="flex items-center gap-3">
          <select value={filterClient} onChange={e => setFilterClient(e.target.value)} className="bg-zinc-900 border border-zinc-800 text-zinc-300 text-sm px-3 py-2 rounded-lg font-body focus:border-zinc-600 focus:outline-none">
            <option value="all">Tous les clients</option>
            {clients.map(c => <option key={c.id} value={c.id}>{c.company}</option>)}
          </select>
          <button onClick={onNewProject} className="bg-amber-500 hover:bg-amber-400 text-zinc-950 font-medium text-sm px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
            <Plus className="w-4 h-4" /> Projet
          </button>
        </div>
      </div>

      <div className="grid grid-cols-6 gap-3 min-h-[60vh]">
        {STAGES.map(stage => {
          const c = STAGE_COLORS[stage.color];
          const stageProjects = filtered.filter(p => p.stage === stage.id);
          const isOver = dragOver === stage.id;
          return (
            <div
              key={stage.id}
              className="flex flex-col"
              onDragOver={e => { e.preventDefault(); setDragOver(stage.id); }}
              onDragLeave={() => setDragOver(prev => prev === stage.id ? null : prev)}
              onDrop={e => {
                e.preventDefault();
                if (dragId) onMoveStage(dragId, stage.id);
                setDragId(null);
                setDragOver(null);
              }}
            >
              <div className={`${c.bg} ${c.border} border rounded-lg px-3 py-2.5 mb-3 ${isOver ? 'ring-2 ring-amber-400/60' : ''}`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${c.dot}`}></span>
                    <span className={`text-xs font-medium ${c.text}`}>{stage.label}</span>
                  </div>
                  <span className="font-mono text-xs text-zinc-500">{stageProjects.length}</span>
                </div>
              </div>
              <div className={`flex-1 space-y-2 rounded-lg p-1 transition-colors ${isOver ? 'bg-zinc-800/40' : ''}`}>
                {stageProjects.map(p => {
                  const client = clients.find(cl => cl.id === p.clientId);
                  const days = daysUntil(p.deadline);
                  const urgent = days <= 3 && days >= 0 && !isClosedStage(p.stage);
                  const overdue = days < 0 && !isClosedStage(p.stage);
                  return (
                    <div
                      key={p.id}
                      draggable
                      onDragStart={() => setDragId(p.id)}
                      onDragEnd={() => { setDragId(null); setDragOver(null); }}
                      className={`bg-zinc-900/80 border border-zinc-800 rounded-lg p-3 hover:border-zinc-600 transition-all group cursor-grab active:cursor-grabbing ${dragId === p.id ? 'opacity-40' : ''}`}
                    >
                      <button onClick={() => onSelectProject(p)} className="w-full text-left">
                        <div className="text-xs text-zinc-500 font-body mb-1 truncate">{client?.company}</div>
                        <div className="text-sm text-zinc-100 font-medium mb-2 leading-snug">{p.title}</div>
                        {(() => {
                          const tasks = p.tasks || [];
                          const done = tasks.filter(t => t.done).length;
                          const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
                          if (tasks.length === 0) return null;
                          return (
                            <div className="mb-2">
                              <div className="flex items-center justify-between text-[10px] font-mono text-zinc-500 mb-1">
                                <span>{done}/{tasks.length} tâches</span>
                                <span>{pct}%</span>
                              </div>
                              <div className="h-1 bg-zinc-800 rounded-full overflow-hidden">
                                <div className={`h-full ${pct === 100 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}></div>
                              </div>
                            </div>
                          );
                        })()}
                        <div className="flex items-center justify-between text-xs">
                          <div className={`flex items-center gap-1 font-mono ${overdue ? 'text-rose-400' : urgent ? 'text-amber-400' : 'text-zinc-500'}`}>
                            <Clock className="w-3 h-3" />
                            {fmtDate(p.deadline)}
                          </div>
                          <div className="font-mono text-zinc-400">{eur(p.budget)}</div>
                        </div>
                        <div className="flex items-center gap-2 mt-2 text-[10px] font-mono">
                          {(p.hoursLogged || 0) > 0 && (
                            <span className="text-zinc-500">⏱ {p.hoursLogged}h</span>
                          )}
                          {(p.revisionHistory?.length || 0) > 0 && (
                            <span className="text-violet-400">⟲ {p.revisionHistory.length} rév.</span>
                          )}
                        </div>
                      </button>
                    </div>
                  );
                })}
                {stageProjects.length === 0 && (
                  <div className="text-xs text-zinc-600 text-center py-6 font-body italic">{searchQuery ? 'Aucun résultat' : 'Vide'}</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

// ============ CALENDAR VIEW ============
const CalendarView = ({ projects, clients, invoices, onSelectProject }) => {
  const [cursor, setCursor] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const days = useMemo(() => {
    const year = cursor.getFullYear();
    const month = cursor.getMonth();
    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);
    const startDay = (first.getDay() + 6) % 7;
    const grid = [];
    for (let i = 0; i < startDay; i++) {
      const d = new Date(year, month, -startDay + i + 1);
      grid.push({ date: d, outside: true });
    }
    for (let i = 1; i <= last.getDate(); i++) grid.push({ date: new Date(year, month, i), outside: false });
    while (grid.length % 7 !== 0) {
      const lastD = grid[grid.length - 1].date;
      const d = new Date(lastD); d.setDate(d.getDate() + 1);
      grid.push({ date: d, outside: true });
    }
    while (grid.length < 42) {
      const lastD = grid[grid.length - 1].date;
      const d = new Date(lastD); d.setDate(d.getDate() + 1);
      grid.push({ date: d, outside: true });
    }
    return grid;
  }, [cursor]);

  const eventsForDay = (date) => {
    const ds = date.toISOString().slice(0, 10);
    const events = [];
    projects.forEach(p => {
      if (p.deadline === ds) events.push({ type: 'deadline', project: p });
    });
    invoices.forEach(i => {
      if (i.dueDate === ds && i.status !== 'paid') events.push({ type: 'invoice-due', invoice: i });
    });
    return events;
  };

  return (
    <div className="space-y-6 animate-in">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-2">Calendrier</div>
          <h1 className="font-display text-4xl text-zinc-100 tracking-tight capitalize">
            {cursor.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })}
          </h1>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1))} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 hover:border-zinc-600 flex items-center justify-center transition-colors">
            <ChevronLeft className="w-4 h-4" />
          </button>
          <button onClick={() => setCursor(new Date(today.getFullYear(), today.getMonth(), 1))} className="text-sm px-3 py-2 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-300 hover:border-zinc-600 font-body transition-colors">Aujourd'hui</button>
          <button onClick={() => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1))} className="w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-zinc-100 hover:border-zinc-600 flex items-center justify-center transition-colors">
            <ChevronRight className="w-4 h-4" />
          </button>
        </div>
      </div>

      <div className="bg-zinc-900/40 border border-zinc-800/80 rounded-xl overflow-hidden">
        <div className="grid grid-cols-7 border-b border-zinc-800">
          {['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map(d => (
            <div key={d} className="px-3 py-2 text-xs uppercase tracking-widest text-zinc-500 font-mono text-center">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7">
          {days.map((d, i) => {
            const events = eventsForDay(d.date);
            const isToday = d.date.toDateString() === today.toDateString();
            return (
              <div key={i} className={`min-h-[110px] border-r border-b border-zinc-800/60 p-2 ${d.outside ? 'opacity-30' : ''} ${isToday ? 'bg-amber-500/5' : ''}`}>
                <div className={`text-xs font-mono mb-1.5 ${isToday ? 'text-amber-400 font-bold' : d.outside ? 'text-zinc-600' : 'text-zinc-400'}`}>
                  {d.date.getDate()}
                </div>
                <div className="space-y-1">
                  {events.slice(0, 3).map((ev, idx) => {
                    if (ev.type === 'deadline') {
                      const c = STAGE_COLORS[stageMeta(ev.project.stage).color];
                      const client = clients.find(cl => cl.id === ev.project.clientId);
                      return (
                        <button key={idx} onClick={() => onSelectProject(ev.project)} className={`w-full text-left ${c.bg} ${c.border} border rounded px-1.5 py-1 group hover:opacity-80 transition`}>
                          <div className="flex items-center gap-1">
                            <span className={`w-1 h-1 rounded-full ${c.dot} flex-shrink-0`}></span>
                            <span className={`text-[10px] font-mono ${c.text} truncate`}>⏱ {client?.company.split(' ')[0]}</span>
                          </div>
                          <div className="text-[10px] text-zinc-300 truncate font-body">{ev.project.title}</div>
                        </button>
                      );
                    }
                    if (ev.type === 'invoice-due') {
                      const overdue = ev.invoice.status === 'overdue';
                      return (
                        <div key={idx} className={`${overdue ? 'bg-rose-500/10 border-rose-500/30' : 'bg-amber-500/10 border-amber-500/30'} border rounded px-1.5 py-1`}>
                          <div className={`text-[10px] font-mono ${overdue ? 'text-rose-300' : 'text-amber-300'} truncate`}>€ {ev.invoice.number.slice(-4)}</div>
                          <div className="text-[10px] text-zinc-300 truncate font-body">{eur(ev.invoice.amount)}</div>
                        </div>
                      );
                    }
                    return null;
                  })}
                  {events.length > 3 && <div className="text-[10px] text-zinc-500 font-mono px-1">+{events.length - 3}</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="flex items-center gap-4 text-xs text-zinc-500 font-body flex-wrap">
        <span>Légende :</span>
        {STAGES.map(s => {
          const c = STAGE_COLORS[s.color];
          return <span key={s.id} className="flex items-center gap-1.5"><span className={`w-2 h-2 rounded-full ${c.dot}`}></span>{s.label}</span>;
        })}
        <span className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-rose-400"></span>Facture en retard</span>
      </div>
    </div>
  );
};

// ============ PROJECT TASKS ============
const ProjectTasks = ({ project, onUpdate }) => {
  const [newLabel, setNewLabel] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const tasks = project.tasks || [];
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;

  const toggle = (id) => {
    onUpdate({ ...project, tasks: tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) });
  };
  const addTask = () => {
    if (!newLabel.trim()) return;
    const newTask = { id: newId(), label: newLabel.trim(), done: false, order: tasks.length };
    onUpdate({ ...project, tasks: [...tasks, newTask] });
    setNewLabel('');
  };
  const removeTask = (id) => {
    onUpdate({ ...project, tasks: tasks.filter(t => t.id !== id) });
  };
  const saveEdit = (id) => {
    if (!editLabel.trim()) { setEditingId(null); return; }
    onUpdate({ ...project, tasks: tasks.map(t => t.id === id ? { ...t, label: editLabel.trim() } : t) });
    setEditingId(null);
  };
  const resetTemplate = () => {
    onUpdate({ ...project, tasks: buildDefaultTasks(project.type) });
  };

  return (
    <div className="p-5 border-t border-zinc-800">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <ListTodo className="w-3.5 h-3.5 text-zinc-500" />
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Tâches</div>
        </div>
        <div className="flex items-center gap-3">
          <span className="text-xs font-mono text-zinc-500">{done}/{tasks.length}</span>
          {tasks.length === 0 && (
            <button onClick={resetTemplate} className="text-xs text-amber-400 hover:text-amber-300 font-body">Charger le modèle {project.type}</button>
          )}
        </div>
      </div>
      {tasks.length > 0 && (
        <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden mb-3">
          <div className={`h-full transition-all ${pct === 100 ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${pct}%` }}></div>
        </div>
      )}
      <div className="space-y-1">
        {tasks.map(task => (
          <div key={task.id} className="flex items-center gap-2 group py-1">
            <button onClick={() => toggle(task.id)} className={`flex-shrink-0 ${task.done ? 'text-emerald-400' : 'text-zinc-600 hover:text-zinc-400'}`}>
              {task.done ? <CheckSquare className="w-4 h-4" /> : <Square className="w-4 h-4" />}
            </button>
            {editingId === task.id ? (
              <input
                autoFocus
                value={editLabel}
                onChange={e => setEditLabel(e.target.value)}
                onBlur={() => saveEdit(task.id)}
                onKeyDown={e => { if (e.key === 'Enter') saveEdit(task.id); if (e.key === 'Escape') setEditingId(null); }}
                className="flex-1 bg-zinc-900 border border-zinc-700 rounded px-2 py-0.5 text-sm text-zinc-200 font-body"
              />
            ) : (
              <button
                onClick={() => { setEditingId(task.id); setEditLabel(task.label); }}
                className={`flex-1 text-left text-sm font-body ${task.done ? 'text-zinc-500 line-through' : 'text-zinc-200'}`}
              >
                {task.label}
              </button>
            )}
            <button onClick={() => removeTask(task.id)} className="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-rose-400 transition-opacity">
              <X className="w-3.5 h-3.5" />
            </button>
          </div>
        ))}
      </div>
      <div className="flex items-center gap-2 mt-3">
        <input
          value={newLabel}
          onChange={e => setNewLabel(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') addTask(); }}
          placeholder="Ajouter une tâche…"
          className="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-1.5 text-sm text-zinc-200 font-body focus:border-zinc-600 focus:outline-none"
        />
        <button onClick={addTask} disabled={!newLabel.trim()} className="text-xs px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-200 rounded-lg font-body">+ Ajouter</button>
      </div>
    </div>
  );
};

    if (!draft.url.trim()) return;
    const kind = draft.kind === 'auto' ? guessKind(draft.url) : draft.kind;

// ============ PROJECT REVISIONS ============
const ProjectRevisions = ({ project, client, onUpdate }) => {
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ feedback: '' });
  const history = project.revisionHistory || [];
  const nextRound = (history.reduce((m, r) => Math.max(m, r.round || 0), 0) || 0) + 1;
  const toast = useToast();
  const sendReminder = () => {
    const tpl = EMAIL_TEMPLATES.reminder(project, client);
    if (!client?.email) {
      copyText(`${tpl.subject}\n\n${tpl.body}`).then(ok => toast?.(ok ? 'Email copié (pas d\'adresse client)' : 'Erreur', ok ? 'info' : 'error'));
      return;
    }
    window.location.href = buildMailto(client.email, tpl);
  };

  const submit = () => {
    if (!draft.feedback.trim()) return;
    const item = { id: newId(), round: nextRound, date: today.toISOString().slice(0, 10), feedback: draft.feedback.trim(), status: 'pending' };
    onUpdate({ ...project, revisionHistory: [...history, item] });
    setDraft({ feedback: '' });
    setShowAdd(false);
  };
  const setStatus = (id, status) => {
    onUpdate({ ...project, revisionHistory: history.map(r => r.id === id ? { ...r, status } : r) });
  };
  const remove = (id) => {
    onUpdate({ ...project, revisionHistory: history.filter(r => r.id !== id) });
  };

  return (
    <div className="p-5 border-t border-zinc-800">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <MessageSquare className="w-3.5 h-3.5 text-zinc-500" />
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono">Historique des révisions</div>
        </div>
        <button onClick={() => setShowAdd(v => !v)} className="text-xs text-amber-400 hover:text-amber-300 font-body inline-flex items-center gap-1">
          {showAdd ? <X className="w-3 h-3" /> : <Plus className="w-3 h-3" />}{showAdd ? 'Annuler' : `Round ${nextRound}`}
        </button>
      </div>

      {showAdd && (
        <div className="mb-3 p-3 bg-zinc-900/60 border border-zinc-800 rounded-lg space-y-2">
          <textarea
            autoFocus
            value={draft.feedback}
            onChange={e => setDraft({ feedback: e.target.value })}
            placeholder={`Retours du client (round ${nextRound})…`}
            rows="3"
            className="w-full bg-zinc-900 border border-zinc-700 rounded px-2 py-1.5 text-sm text-zinc-200 font-body"
          />
          <div className="flex justify-end">
            <button onClick={submit} disabled={!draft.feedback.trim()} className="text-xs px-3 py-1.5 bg-amber-500 hover:bg-amber-400 disabled:opacity-40 disabled:cursor-not-allowed text-zinc-950 rounded-lg font-medium">Enregistrer</button>
          </div>
        </div>
      )}

      {history.length === 0 && !showAdd && (
        <div className="text-sm text-zinc-600 italic font-body">Aucune révision enregistrée.</div>
      )}

      <div className="space-y-2">
        {history.slice().sort((a, b) => b.round - a.round).map(r => {
          const isPending = r.status === 'pending';
          return (
            <div key={r.id} className={`group p-3 rounded-lg border ${isPending ? 'bg-amber-500/5 border-amber-500/30' : 'bg-zinc-900/60 border-zinc-800'}`}>
              <div className="flex items-start justify-between gap-3 mb-1.5">
                <div className="flex items-center gap-2">
                  <span className={`text-xs font-mono px-2 py-0.5 rounded-full ${isPending ? 'bg-amber-500/15 text-amber-300' : 'bg-emerald-500/15 text-emerald-300'}`}>
                    Round {r.round}
                  </span>
                  <span className="text-xs text-zinc-500 font-mono">{fmtDate(r.date)}</span>
                  <span className={`text-[10px] uppercase tracking-wider font-mono ${isPending ? 'text-amber-400' : 'text-emerald-400'}`}>{isPending ? 'À traiter' : 'Traité'}</span>
                </div>
                <div className="flex items-center gap-2">
                  {isPending && (
                    <>
                      <button onClick={sendReminder} title={client?.email || 'Pas d\'email client'} className="text-xs text-amber-400 hover:text-amber-300 font-body inline-flex items-center gap-1">
                        <Send className="w-3 h-3" /> Relancer
                      </button>
                      <button onClick={() => setStatus(r.id, 'addressed')} className="text-xs text-emerald-400 hover:text-emerald-300 font-body inline-flex items-center gap-1">
                        <Check className="w-3 h-3" /> Traité
                      </button>
                    </>
                  )}
                  {!isPending && (
                    <button onClick={() => setStatus(r.id, 'pending')} className="text-xs text-zinc-500 hover:text-amber-400 font-body">Rouvrir</button>
                  )}
                  <button onClick={() => remove(r.id)} className="opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-rose-400 transition-opacity ml-1">
                    <Trash2 className="w-3 h-3" />
                  </button>
                </div>
              </div>
              <div className="text-sm text-zinc-300 font-body whitespace-pre-wrap">{r.feedback}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ============ PROJECT DETAIL MODAL ============
const ProjectDetail = ({ project, clients, invoices, onClose, onUpdate, onMoveStage, onDelete, onUpdateInvoice, onDuplicate, timer, onStartTimer, onStopTimer }) => {
  const [editing, setEditing] = useState(false);
  const [data, setData] = useState(project);
  const [confirmDel, setConfirmDel] = useState(false);
  useEscape(true, onClose);
  useEffect(() => { setData(project); setEditing(false); }, [project?.id]);
  if (!project) return null;
  const client = clients.find(c => c.id === project.clientId);
  const projectInvoices = invoices.filter(i => i.projectId === project.id);
  const stageIdx = STAGES.findIndex(s => s.id === project.stage);

  const handleSave = () => {
    if (!data.title.trim()) return;
    onUpdate(data, { toast: 'Projet mis à jour' });
    setEditing(false);
  };
  // Le changement de stage (montants + resync des factures « Encaissé ») est
  // centralisé dans moveStage au niveau du dashboard, partagé avec le kanban.
  const advanceStage = () => {
    if (stageIdx < STAGES.length - 1) onMoveStage(project.id, STAGES[stageIdx + 1].id);
  };
  const previousStage = () => {
    if (stageIdx > 0) onMoveStage(project.id, STAGES[stageIdx - 1].id);
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-in" onClick={onClose}>
      <div className="bg-zinc-950 border border-zinc-800 rounded-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto scrollbar-thin" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-zinc-950 border-b border-zinc-800 p-5 flex items-start justify-between z-10">
          <div className="flex-1">
            <div className="flex items-center gap-3 mb-2">
              <StagePill stage={project.stage} size="md" />
              <span className="text-xs font-mono text-zinc-500">{client?.company}</span>
            </div>
            {editing ? (
              <input value={data.title} onChange={e => setData({ ...data, title: e.target.value })} className="font-display text-2xl text-zinc-100 bg-zinc-900 border border-zinc-700 rounded px-2 py-1 w-full" />
            ) : (
              <h2 className="font-display text-2xl text-zinc-100">{project.title}</h2>
            )}
            <div className="text-xs text-zinc-500 font-body mt-1">{project.type}</div>
          </div>
          <div className="flex items-center gap-2">
            {!editing && <button onClick={() => setEditing(true)} className="w-9 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center"><Edit3 className="w-4 h-4" /></button>}
            {editing && <button onClick={handleSave} className="px-3 h-9 rounded-lg bg-emerald-500 hover:bg-emerald-400 text-zinc-950 text-sm font-medium">Sauvegarder</button>}
            <button onClick={onClose} className="w-9 h-9 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-100 flex items-center justify-center"><X className="w-4 h-4" /></button>
          </div>
        </div>

        <div className="p-5 border-b border-zinc-800">
          <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-3">Étape</div>
          <div className="flex items-center gap-1">
            {STAGES.map((s, i) => {
              const c = STAGE_COLORS[s.color];
              const done = i < stageIdx;
              const current = i === stageIdx;
              return (
                <React.Fragment key={s.id}>
                  <div className={`flex-1 px-2 py-2 rounded-lg border text-center ${current ? `${c.bg} ${c.border} ${c.text}` : done ? 'bg-zinc-800 border-zinc-700 text-zinc-400' : 'bg-zinc-900 border-zinc-800 text-zinc-600'}`}>
                    <div className="text-[10px] font-mono uppercase tracking-wider">{s.label}</div>
                  </div>
                  {i < STAGES.length - 1 && <div className={`w-2 h-px ${i < stageIdx ? 'bg-zinc-600' : 'bg-zinc-800'}`}></div>}
                </React.Fragment>
              );
            })}
          </div>
          <div className="flex items-center justify-between mt-4">
            <button onClick={previousStage} disabled={stageIdx === 0} className="text-sm text-zinc-400 hover:text-zinc-100 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1 font-body">
              <ChevronLeft className="w-4 h-4" /> Étape précédente
            </button>
            <button onClick={advanceStage} disabled={stageIdx === STAGES.length - 1} className="text-sm bg-amber-500/10 border border-amber-500/30 text-amber-300 hover:bg-amber-500/20 disabled:opacity-30 disabled:cursor-not-allowed px-3 py-1.5 rounded-lg flex items-center gap-1 font-body">
              Étape suivante <ChevronRight className="w-4 h-4" />
            </button>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-px bg-zinc-800">
          <div className="bg-zinc-950 p-5">
            <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-3">Dates</div>
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-sm text-zinc-400 font-body">Démarrage</span>
                <span className="font-mono text-sm text-zinc-200">{fmtDateLong(project.startDate)}</span>

              <div className="flex justify-between items-center">
                <span className="text-sm text-zinc-400 font-body">Deadline</span>

              </div>

                <span className="text-sm text-zinc-400 font-body">Restant</span>

              </div>
            </div>
          </div>
          <div className="bg-zinc-950 p-5">
            <div className="text-xs uppercase tracking-widest text-zinc-500 font-mono mb-3">Financier</div>
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-sm text-zinc-400 font-body">Budget</span>

                  <input type="number" value={data.budget} onChange={e => setData({ ...data, budget: parseFloat(e.target.value) })} className="bg-zinc-900 border border-zinc-700 rounded px-2 py-1 text-sm font-mono text-zinc-200 w-24 text-right" />

                  <span className="font-mono text-sm text-zinc-100">{eur(project.budget)}</span>

              <div className="flex justify-between items-center">

// ============ NOTIFICATIONS DROPDOWN ============
const NotificationsPanel = ({ projects, invoices, clients, onSelectProject, onNavigate, onClose }) => {
  const ref = useRef(null);
  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener('mousedown', onClick), 0);
    return () => document.removeEventListener('mousedown', onClick);
  }, [onClose]);

  const overdueInvoices = invoices.filter(i => i.status === 'overdue');
  const upcomingDeadlines = projects
    .filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) >= 0 && daysUntil(p.deadline) <= 5)
    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  const overdueProjects = projects
    .filter(p => !isClosedStage(p.stage) && daysUntil(p.deadline) < 0);
  const pendingRevisions = projects
    .flatMap(p => (p.revisionHistory || []).filter(r => r.status === 'pending').map(r => ({ project: p, revision: r })))
    .sort((a, b) => new Date(a.revision.date) - new Date(b.revision.date));

  const total = overdueInvoices.length + upcomingDeadlines.length + overdueProjects.length + pendingRevisions.length;

  return (
    <div ref={ref} className="absolute right-0 top-12 w-96 bg-zinc-950 border border-zinc-800 rounded-xl shadow-2xl z-30 animate-in overflow-hidden">
      <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
        <div>
          <div className="font-display text-lg text-zinc-100">Notifications</div>
          <div className="text-xs text-zinc-500 font-mono">{total} alerte{total !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div className="max-h-96 overflow-y-auto scrollbar-thin">

// ============ TEAM (ADMIN) ============
// Wrapper qui appelle l'edge function `team-admin`. Toujours envoyer le JWT.
const callTeamAdmin = async (action, payload = {}) => {
  const { data: sessionData } = await supabase.auth.getSession();
  const token = sessionData?.session?.access_token;
  if (!token) throw new Error('Session expirée — reconnecte-toi');
  const res = await fetch(`${SUPABASE_URL}/functions/v1/team-admin`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      'apikey': SUPABASE_PUBLISHABLE_KEY
    },
    body: JSON.stringify({ action, ...payload })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data?.error || `Erreur ${res.status}`);
  return data;
};

const ROLE_META = {
  admin:  { label: 'Admin',  color: 'amber',   desc: 'Gère l’équipe et accède à tout' },
  member: { label: 'Membre', color: 'sky',     desc: 'Crée et modifie projets, clients, factures' },
  viewer: { label: 'Lecture',color: 'zinc',    desc: 'Consulte uniquement, sans modifier' }
};
const ROLE_BADGE = {
  amber: 'bg-amber-500/15 text-amber-200 border-amber-500/30',
  sky:   'bg-sky-500/15 text-sky-200 border-sky-500/30',
  zinc:  'bg-zinc-700/40 text-zinc-300 border-zinc-600/60'
};

const RoleBadge = ({ role }) => {
  const meta = ROLE_META[role] || ROLE_META.member;
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-[10px] font-mono uppercase tracking-wider border ${ROLE_BADGE[meta.color]}`}>
      <Shield className="w-2.5 h-2.5" /> {meta.label}
    </span>
  );
};

const fmtRelativeOrDash = (s) => {
  if (!s) return '—';
  const d = new Date(s);
  const days = Math.floor((today - d) / 86400000);
  if (days < 1) return "aujourd'hui";
  if (days < 2) return 'hier';
  if (days < 7) return `il y a ${days}j`;
  if (days < 30) return `il y a ${Math.floor(days / 7)}sem.`;
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
};

// ----- EditMemberModal (rôle + nom) -----
const EditMemberModal = ({ user, currentUserId, onClose, onSaved }) => {
  const [role, setRole] = useState(user.role);
  const [name, setName] = useState(user.name || '');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);
  const toast = useToast();
  const isMe = user.id === currentUserId;

  const submit = async (e) => {
    e.preventDefault();
    setError(null); setSubmitting(true);
    try {
      const promises = [];
      if ((name || '') !== (user.name || '')) {
        promises.push(callTeamAdmin('update_user_name', { userId: user.id, name: name.trim() || null }));
      }
      if (role !== user.role) {
        promises.push(callTeamAdmin('update_user_role', { userId: user.id, role }));
      }
      if (promises.length === 0) { onClose(); return; }
      await Promise.all(promises);
      toast?.('Membre mis à jour');
      onSaved?.();
      onClose();

          <div className="grid grid-cols-3 gap-2">
            {(['admin', 'member', 'viewer']).map(r => {

            {submitting ? '…' : 'Enregistrer'}
          </button>
        </div>
      </form>
    </ModalShell>
  );
};
